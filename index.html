<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALM OF SHADOWS — 20 Floors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020208;display:flex;justify-content:center;padding:16px;min-height:100vh;font-family:'Georgia',serif}
#app{width:100%;max-width:720px;color:#e8d5a3}
#title-sc{text-align:center;padding:30px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center}
#title-canvas{border-radius:12px;margin-bottom:16px}
.title-h1{font-size:32px;color:#f5a623;letter-spacing:3px;margin-bottom:6px}
.title-sub{color:#888;font-size:12px;margin-bottom:6px;letter-spacing:1px}
.title-feat{color:#555;font-size:11px;margin-bottom:22px}
.big-btn{padding:13px 32px;background:#e94560;border:none;border-radius:10px;color:#fff;font-size:17px;cursor:pointer;font-family:Georgia,serif;transition:all .2s}
.big-btn:hover{background:#c0392b;transform:scale(1.04)}
.small-btn{padding:7px 18px;background:transparent;border:1px solid #333;border-radius:7px;color:#888;font-size:12px;cursor:pointer;font-family:Georgia,serif;margin-top:8px}
.small-btn:hover{border-color:#777;color:#e8d5a3}
#mute-btn{position:absolute;top:12px;right:12px;background:#111;border:1px solid #222;border-radius:6px;color:#888;padding:5px 9px;cursor:pointer;font-size:11px;z-index:10}
.sc{display:none;padding:10px}.sc.on{display:block}
#hud{background:#080816;border:1px solid #1a1a30;border-radius:10px;padding:7px 11px;margin-bottom:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hi{font-size:10px;color:#555}.hi b{color:#e8d5a3;font-size:12px}
.bw{min-width:60px;flex:1}.bar{height:7px;border-radius:4px;background:#0d0d1a;overflow:hidden;margin-top:1px}
.bf{height:100%;border-radius:4px;transition:width .3s}
.hpb{background:#c0392b}.mpb{background:#1a5276}.xpb{background:#7d6608}
#map-wrap{position:relative;display:inline-block}
#map-canvas,#map-overlay{display:block;border-radius:8px;border:1px solid #1a1a30;image-rendering:pixelated}
#map-overlay{position:absolute;top:0;left:0;pointer-events:none;border-radius:8px}
#log{background:#020208;border:1px solid #0d0d1a;border-radius:6px;padding:5px 9px;height:64px;overflow-y:auto;font-size:11px;color:#777;margin:5px 0}
#log p{margin:1px 0;line-height:1.4}
#log .g{color:#27ae60}#log .r{color:#c0392b}#log .b{color:#8e44ad}#log .y{color:#e67e22}#log .c{color:#16a085}
.dpad{display:grid;grid-template-columns:repeat(3,36px);gap:3px}
.dpad button{width:36px;height:36px;background:#080816;border:1px solid #1a1a30;border-radius:5px;color:#e8d5a3;font-size:13px;cursor:pointer}
.dpad button:hover{background:#0f3460}.dpad button:active{transform:scale(.88);background:#e94560}
.ctrl-row{display:flex;gap:3px;margin-top:4px}
.ctrl-btn{padding:4px 8px;background:#080816;border:1px solid #1a1a30;border-radius:5px;color:#888;cursor:pointer;font-size:11px;font-family:Georgia,serif}
.ctrl-btn:hover{border-color:#444;color:#e8d5a3}
#battle-sc{text-align:center}
#b-hud{background:#080816;border:1px solid #1a1a30;border-radius:10px;padding:7px 11px;margin-bottom:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#battle-canvas{display:block;margin:0 auto;border-radius:10px;border:1px solid #1a1a30}
#enm-name{font-size:16px;color:#e94560;margin:4px 0}
#phase-badge{font-size:11px;color:#9c27b0;min-height:14px}
#ehp-wrap{max-width:200px;margin:3px auto}
.btns{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:7px}
.btns button{padding:6px 12px;background:#080816;border:1px solid #252540;border-radius:6px;color:#e8d5a3;cursor:pointer;font-size:12px;font-family:Georgia,serif;transition:all .15s}
.btns button:hover{background:#0f3460;border-color:#e94560}
.btns button:disabled{opacity:.3;cursor:default}
.panel{background:#080816;border:1px solid #1a1a30;border-radius:10px;padding:11px}
.panel h2{font-size:16px;margin-bottom:9px}
.shoprow{background:#040410;border:1px solid #1a1a30;border-radius:6px;padding:6px 10px;margin:3px 0;display:flex;align-items:center;justify-content:space-between;gap:7px;font-size:12px}
.shoprow button{padding:4px 9px;background:#7b1fa2;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:11px}
.shoprow button:hover{background:#6a1b9a}
.shoprow button:disabled{background:#1a1a1a;color:#444;cursor:default}
.qrow{background:#040410;border:1px solid #1a1a30;border-radius:6px;padding:6px 10px;margin:3px 0;font-size:12px}
.qrow.done{border-color:#1e5c1e;opacity:.65}
.iv-title{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.itm{display:inline-block;background:#040410;border:1px solid #222;border-radius:4px;padding:2px 6px;margin:2px;font-size:11px;cursor:pointer}
.itm:hover{border-color:#f5a623}
.sk-btn{padding:4px 8px;background:#040410;border:1px solid #222;border-radius:4px;color:#e8d5a3;cursor:pointer;font-size:11px;font-family:Georgia,serif;margin:2px}
.sk-btn:hover{background:#0f3460;border-color:#9c27b0}
.sk-btn:disabled{opacity:.3;cursor:default}
.save-row{background:#040410;border:1px solid #1a1a30;border-radius:6px;padding:6px 10px;margin:3px 0;display:flex;align-items:center;justify-content:space-between;font-size:12px}
.save-row button{padding:3px 9px;background:#0f3460;border:1px solid #1a1a30;border-radius:4px;color:#e8d5a3;cursor:pointer;font-size:11px}
.save-row button:hover{background:#163a60}
.ebtn{padding:8px 20px;background:#040410;border:1px solid #222;border-radius:7px;color:#e8d5a3;font-size:13px;cursor:pointer;margin-top:10px;font-family:Georgia,serif}
.ebtn:hover{background:#0f3460}
#go-sc,#win-sc{text-align:center;padding:36px 16px}
#go-sc h2{color:#e94560;font-size:24px}#win-sc h2{color:#f5a623;font-size:24px}
.ivbox{background:#040410;border:1px solid #1a1a30;border-radius:7px;padding:6px 8px;margin-top:4px}
.floor-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin-left:6px}
</style>
</head>
<body>
<div id="app">
<button id="mute-btn" onclick="toggleMute()">🔊</button>

<div id="title-sc" class="sc on">
  <canvas id="title-canvas" width="480" height="160"></canvas>
  <div class="title-h1">⚔ REALM OF SHADOWS ⚔</div>
  <div class="title-sub">剣と魔法の本格ファンタジーRPG</div>
  <div class="title-feat">20フロア・20体のボス・スキル・クエスト・セーブ機能搭載</div>
  <button class="big-btn" onclick="startGame()">🗡 冒険を始める</button><br>
  <button class="small-btn" onclick="loadGame()">💾 セーブデータを読む</button>
  <div style="margin-top:16px;color:#2a2a2a;font-size:11px">矢印キー or D字ボタンで移動</div>
</div>

<div id="map-sc" class="sc">
  <div id="hud">
    <div class="hi">❤️<div class="bw"><div class="bar"><div class="bf hpb" id="hpb"></div></div></div></div>
    <div class="hi">💧<div class="bw"><div class="bar"><div class="bf mpb" id="mpb"></div></div></div></div>
    <div class="hi">⭐Lv<span id="lvd">1</span><div class="bw"><div class="bar"><div class="bf xpb" id="xpb"></div></div></div></div>
    <div class="hi">💰<b id="gd">0</b>G</div>
    <div class="hi">⚔️<b id="atkd">10</b> 🛡<b id="defd">4</b></div>
    <div class="hi">🗺F<b id="fld">1</b>/20</div>
  </div>
  <div id="map-wrap">
    <canvas id="map-canvas" width="468" height="468"></canvas>
    <canvas id="map-overlay" width="468" height="468"></canvas>
  </div>
  <div id="log"></div>
  <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap">
    <div>
      <div class="dpad">
        <div></div><button onclick="move(0,-1)">▲</button><div></div>
        <button onclick="move(-1,0)">◀</button><div></div><button onclick="move(1,0)">▶</button>
        <div></div><button onclick="move(0,1)">▼</button><div></div>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="showSave()">💾</button>
        <button class="ctrl-btn" onclick="showQuests()">📋</button>
        <button class="ctrl-btn" onclick="showStats()">📊</button>
      </div>
    </div>
    <div class="ivbox" style="flex:1;min-width:120px">
      <div class="iv-title">🎒 アイテム</div><div id="ivl"></div>
    </div>
    <div class="ivbox" style="flex:1;min-width:120px">
      <div class="iv-title">✨ スキル</div><div id="skl"></div>
    </div>
  </div>
</div>

<div id="battle-sc" class="sc">
  <div id="b-hud">
    <div class="hi">❤️<div class="bw"><div class="bar"><div class="bf hpb" id="bhpb"></div></div></div></div>
    <div class="hi">💧<div class="bw"><div class="bar"><div class="bf mpb" id="bmpb"></div></div></div></div>
    <div class="hi">💰<b id="bgd">0</b>G</div>
    <div class="hi">⚔️<b id="batkd">10</b> 🛡<b id="bdefd">4</b></div>
  </div>
  <canvas id="battle-canvas" width="480" height="300"></canvas>
  <div id="enm-name"></div>
  <div id="ehp-wrap">
    <div style="font-size:11px;color:#777;margin-bottom:2px">HP: <span id="ehpt"></span></div>
    <div class="bar" style="height:9px"><div class="bf hpb" id="ehpb"></div></div>
  </div>
  <div id="phase-badge"></div>
  <div id="log" style="max-width:320px;margin:4px auto"></div>
  <div class="btns" id="battle-btns">
    <button onclick="ba('attack')">⚔️ 攻撃</button>
    <button onclick="ba('magic')">✨ 魔法(10MP)</button>
    <button onclick="ba('skill')">🌟 スキル</button>
    <button onclick="ba('item')">🧪 アイテム</button>

  </div>

</div>

<div id="shop-sc" class="sc"><div class="panel">
  <h2 style="color:#9c27b0">🏪 商店</h2>
  <div id="shop-g" style="color:#f5a623;margin-bottom:8px;font-size:12px"></div>
  <div id="shop-items"></div>
  <button class="ebtn" onclick="leaveShop()">店を出る</button>
</div></div>

<div id="npc-sc" class="sc"><div class="panel">
  <h2 style="color:#2196f3">💬 老賢者</h2>
  <div id="npc-text" style="font-size:13px;line-height:1.8;margin-bottom:10px;color:#ccc;white-space:pre-line"></div>
  <button class="ebtn" onclick="show('map-sc')">閉じる</button>
</div></div>

<div id="quest-sc" class="sc"><div class="panel">
  <h2 style="color:#f5a623">📋 クエスト</h2>
  <div id="qlist"></div>
  <button class="ebtn" onclick="show('map-sc')">戻る</button>
</div></div>

<div id="stats-sc" class="sc"><div class="panel">
  <h2 style="color:#e8d5a3">📊 ステータス</h2>
  <div id="stats-body"></div>
  <button class="ebtn" onclick="show('map-sc')">戻る</button>
</div></div>

<div id="save-sc" class="sc"><div class="panel">
  <h2 style="color:#00bcd4">💾 セーブ / ロード</h2>
  <div id="save-slots"></div>
  <button class="ebtn" onclick="show('map-sc')">戻る</button>
</div></div>

<div id="go-sc" class="sc">
  <div style="font-size:52px;margin:16px 0">💀</div>
  <h2>ゲームオーバー</h2>
  <p style="color:#666;margin-top:8px">勇者は倒れた…</p>
  <div style="margin-top:14px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap">
    <button class="ebtn" onclick="startGame()">最初から</button>
    <button class="ebtn" onclick="loadGame()">セーブからロード</button>
  </div>
</div>

<div id="win-sc" class="sc">
  <div style="font-size:52px;margin:16px 0">🏆</div>
  <h2>全20フロア制覇！</h2>
  <div id="win-stats" style="color:#888;margin-top:10px;font-size:13px"></div>
  <button class="ebtn" onclick="startGame()">ニューゲーム</button>
</div>
</div>

<script>
// ===== AUDIO ENGINE v3 — Tone.js =====
let toneReady=false, muted=true, currentBGM=null;
let bgmParts=[];

function initAudio(){
  if(toneReady) return;
  if(typeof Tone==='undefined'){ console.warn('Tone.js not loaded'); return; }
  Tone.start();
  toneReady=true;
  buildInstruments();
}

let leadSynth,padSynth,bassSynth,arpSynth,drumKit;

function buildInstruments(){
  if(!toneReady||typeof Tone==='undefined') return;
  leadSynth=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'sawtooth'},
    envelope:{attack:0.02,decay:0.15,sustain:0.5,release:0.3},volume:-14
  });
  const ldDist=new Tone.Distortion(0.12);
  const ldChorus=new Tone.Chorus(3,2.5,0.4).start();
  const ldRev=new Tone.Reverb({decay:1.2,wet:0.18}).toDestination();
  leadSynth.chain(ldDist,ldChorus,ldRev);

  padSynth=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'triangle'},
    envelope:{attack:0.2,decay:0.3,sustain:0.7,release:0.8},volume:-20
  });
  const pdRev=new Tone.Reverb({decay:3,wet:0.45}).toDestination();
  const pdChorus=new Tone.Chorus(2,3,0.6).start();
  padSynth.chain(pdChorus,pdRev);

  bassSynth=new Tone.MonoSynth({
    oscillator:{type:'sawtooth'},
    filter:{type:'lowpass',frequency:350,rolloff:-24},
    envelope:{attack:0.01,decay:0.1,sustain:0.6,release:0.15},
    filterEnvelope:{attack:0.01,decay:0.08,sustain:0.3,release:0.1,baseFrequency:80,octaves:2.5},
    volume:-10
  }).toDestination();

  arpSynth=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'square'},
    envelope:{attack:0.005,decay:0.1,sustain:0.3,release:0.15},volume:-18
  });
  const arpDelay=new Tone.PingPongDelay('16n',0.18);
  const arpRev=new Tone.Reverb({decay:0.8,wet:0.12}).toDestination();
  arpSynth.chain(arpDelay,arpRev);

  drumKit={
    kick:new Tone.MembraneSynth({pitchDecay:0.06,octaves:8,envelope:{attack:0.001,decay:0.28,sustain:0,release:0.1},volume:-6}).toDestination(),
    snare:new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:0.001,decay:0.15,sustain:0,release:0.05},volume:-14}).toDestination(),
    hihat:new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:0.001,decay:0.04,sustain:0,release:0.01},volume:-22}).toDestination(),
    openhat:new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:0.001,decay:0.18,sustain:0,release:0.08},volume:-24}).toDestination(),
  };
  const hhFilt=new Tone.Filter(8000,'highpass').toDestination();
  drumKit.hihat.disconnect();drumKit.hihat.connect(hhFilt);
  drumKit.openhat.disconnect();drumKit.openhat.connect(hhFilt);
}

function stopBGM(){
  bgmParts.forEach(p=>{try{p.stop();p.dispose();}catch(e){}});
  bgmParts=[];
  if(toneReady&&typeof Tone!=='undefined') Tone.Transport.stop();
  currentBGM=null;
}

function startBGM(name){
  stopBGM();
  if(muted||!toneReady||typeof Tone==='undefined') return;
  currentBGM=name;
  Tone.Transport.loop=true; Tone.Transport.loopEnd='8m';
  ({explore:buildExplore,battle:buildBattle,boss:buildBoss,final:buildFinal}[name]||buildExplore)();
  Tone.Transport.start();
}

function addPart(events,cb){ const p=new Tone.Part(cb,events).start(0); bgmParts.push(p); }

function buildExplore(){
  Tone.Transport.bpm.value=108;
  // Pads: Dm-Bb-Am-C x2
  addPart([
    {time:'0m',n:['D3','F3','A3']},{time:'2m',n:['Bb2','D3','F3']},
    {time:'4m',n:['A2','C3','E3']},{time:'6m',n:['C3','E3','G3']},
  ],(t,v)=>padSynth.triggerAttackRelease(v.n,'2m',t,0.55));

  addPart([
    {time:'0:0',n:'D2',d:'4n'},{time:'0:2',n:'D2',d:'8n'},{time:'0:3',n:'F2',d:'8n'},
    {time:'1:0',n:'Bb1',d:'4n'},{time:'1:2',n:'Bb1',d:'8n'},{time:'1:3',n:'C2',d:'8n'},
    {time:'2:0',n:'A1',d:'4n'},{time:'2:2',n:'A1',d:'8n'},{time:'2:3',n:'G1',d:'8n'},
    {time:'3:0',n:'C2',d:'4n'},{time:'3:2',n:'C2',d:'8n'},{time:'3:3',n:'D2',d:'8n'},
    {time:'4:0',n:'D2',d:'4n'},{time:'4:2',n:'D2',d:'8n'},{time:'4:3',n:'E2',d:'8n'},
    {time:'5:0',n:'Bb1',d:'4n.'},{time:'5:3',n:'A1',d:'8n'},
    {time:'6:0',n:'G1',d:'4n'},{time:'6:2',n:'A1',d:'8n'},{time:'6:3',n:'Bb1',d:'8n'},
    {time:'7:0',n:'A1',d:'2n'},
  ],(t,v)=>bassSynth.triggerAttackRelease(v.n,v.d,t,0.7));

  addPart([
    {t:'0:0',n:'D4'},{t:'0:1',n:'F4'},{t:'0:2',n:'A4'},{t:'0:3',n:'F4'},
    {t:'1:0',n:'Bb3'},{t:'1:1',n:'D4'},{t:'1:2',n:'F4'},{t:'1:3',n:'D4'},
    {t:'2:0',n:'A3'},{t:'2:1',n:'C4'},{t:'2:2',n:'E4'},{t:'2:3',n:'C4'},
    {t:'3:0',n:'C4'},{t:'3:1',n:'E4'},{t:'3:2',n:'G4'},{t:'3:3',n:'E4'},
    {t:'4:0',n:'D4'},{t:'4:1',n:'F4'},{t:'4:2',n:'A4'},{t:'4:3',n:'F4'},
    {t:'5:0',n:'Bb4'},{t:'5:1',n:'A4'},{t:'5:2',n:'G4'},{t:'5:3',n:'F4'},
    {t:'6:0',n:'E4'},{t:'6:1',n:'D4'},{t:'6:2',n:'C4'},{t:'6:3',n:'D4'},
    {t:'7:0',n:'A3'},{t:'7:1',n:'C4'},{t:'7:2',n:'D4'},{t:'7:3',n:'E4'},
  ].map(v=>({time:v.t,...v})), (t,v)=>arpSynth.triggerAttackRelease(v.n,'8n',t,0.5));

  addPart([
    {t:'2:0',n:'D5',d:'8n'},{t:'2:1',n:'C5',d:'8n'},{t:'2:1.5',n:'Bb4',d:'8n'},{t:'2:2',n:'A4',d:'4n'},
    {t:'3:0',n:'G4',d:'8n'},{t:'3:1',n:'F4',d:'8n'},{t:'3:2',n:'E4',d:'8n'},{t:'3:3',n:'F4',d:'8n'},
    {t:'4:0',n:'D5',d:'4n.'},{t:'4:3',n:'C5',d:'8n'},
    {t:'5:0',n:'Bb4',d:'8n'},{t:'5:1',n:'A4',d:'8n'},{t:'5:2',n:'G4',d:'4n'},
    {t:'6:0',n:'F4',d:'4n'},{t:'6:2',n:'E4',d:'8n'},{t:'6:3',n:'D4',d:'8n'},
    {t:'7:0',n:'A4',d:'2n.'},
  ].map(v=>({time:v.t,...v})),(t,v)=>leadSynth.triggerAttackRelease(v.n,v.d,t,0.65));

  const drums=[];
  for(let m=0;m<8;m++){
    drums.push({time:`${m}:0`,tp:'kick'},{time:`${m}:2`,tp:'kick'});
    drums.push({time:`${m}:1`,tp:'snare'},{time:`${m}:3`,tp:'snare'});
    for(let s=0;s<8;s++) drums.push({time:`${m}:${s*0.5}`,tp:'hh'});
  }
  addPart(drums,(t,v)=>{
    if(v.tp==='kick') drumKit.kick.triggerAttackRelease('C1','8n',t);
    else if(v.tp==='snare') drumKit.snare.triggerAttackRelease('8n',t,0.6);
    else drumKit.hihat.triggerAttackRelease('32n',t,0.5);
  });
}

function buildBattle(){
  Tone.Transport.bpm.value=150;
  addPart([
    {time:'0:0',n:['A3','E4']},{time:'0:2',n:['A3','E4']},{time:'0:2.5',n:['A3','E4']},
    {time:'1:0',n:['G3','D4']},{time:'1:2',n:['G3','D4']},{time:'1:2.5',n:['G3','D4']},
    {time:'2:0',n:['F3','C4']},{time:'2:2',n:['F3','C4']},{time:'2:2.5',n:['F3','C4']},
    {time:'3:0',n:['E3','B3']},{time:'3:1',n:['F3','C4']},{time:'3:2',n:['G3','D4']},{time:'3:3',n:['E3','B3']},

// ===== MAP GENERATION (procedural 13x13) =====
function genMap(seed){
  const W=13,H=13;
  const grid=Array.from({length:H},()=>Array(W).fill(1));
  let s=seed;
  function rng(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;}
  // Recursive backtracker maze starting from (1,1)
  function carve(x,y){
    const dirs=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>rng()-0.5);
    for(const[dx,dy]of dirs){
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<W-1&&ny>0&&ny<H-1&&grid[ny][nx]===1){
        grid[y+dy/2][x+dx/2]=0;grid[ny][nx]=0;carve(nx,ny);
      }
    }
  }
  grid[1][1]=0;carve(1,1);
  // Extra openings for variety
  for(let i=0;i<8;i++){
    const x=1+Math.floor(rng()*(W-2)),y=1+Math.floor(rng()*(H-2));
    if(x>0&&x<W-1&&y>0&&y<H-1)grid[y][x]=0;
  }
  // ===== HARD GUARANTEES: key cells always open =====
  // Player start + room
  grid[1][1]=0; grid[1][2]=0; grid[2][1]=0; grid[1][3]=0; grid[3][1]=0;
  // Boss room (11,11)
  grid[11][11]=0; grid[10][11]=0; grid[11][10]=0; grid[10][10]=0; grid[9][11]=0; grid[11][9]=0;
  // Exit (11,1)
  grid[11][1]=0; grid[10][1]=0; grid[9][1]=0; grid[11][2]=0;
  // Shop (1,11)
  grid[1][11]=0; grid[2][11]=0; grid[3][11]=0; grid[1][10]=0;
  // NPC (6,1) — open a clear L-shaped corridor from start to NPC
  grid[6][1]=0; grid[5][1]=0; grid[4][1]=0; grid[3][1]=0; grid[7][1]=0; grid[6][2]=0;
  // Save (1,5)
  grid[1][5]=0; grid[1][4]=0; grid[2][5]=0;

  // ===== GUARANTEED CORRIDOR NETWORK =====
  // Top spine: row 1, connect start (1,1) to NPC (1,6) to shop (1,11)
  for(let x=1;x<=11;x++) grid[1][x]=0;
  // Bottom spine: row 11, connect exit (11,1) to boss (11,11)
  for(let x=1;x<=11;x++) grid[11][x]=0;
  // Left spine: col 1, connect start (1,1) to exit (11,1)
  for(let y=1;y<=11;y++) grid[y][1]=0;
  // Right spine: col 11, connect shop (1,11) to boss (11,11)
  for(let y=1;y<=11;y++) grid[y][11]=0;
  // Centre cross for extra routing
  for(let x=1;x<=11;x++) if(grid[6][x]===1) grid[6][x]=0;
  for(let y=1;y<=11;y++) if(grid[y][6]===1) grid[y][6]=0;

  return grid;
}

const TILE=36;
let mapCanvas,mapCtx,overlayCtx,battleCtx;
let particles=[];
let animFrame=null,battleAnimFrame=null;
let enemyShake=0,playerAtkAnim=0,magicAnim=0;

function initCanvases(){
  mapCanvas=document.getElementById('map-canvas');
  mapCtx=mapCanvas.getContext('2d');
  const ov=document.getElementById('map-overlay');
  overlayCtx=ov.getContext('2d');
  const sz=13*TILE;
  [mapCanvas,ov].forEach(c=>{c.width=sz;c.height=sz;});
  battleCtx=document.getElementById('battle-canvas').getContext('2d');
  if(animFrame)cancelAnimationFrame(animFrame);
  if(battleAnimFrame)cancelAnimationFrame(battleAnimFrame);
  animLoop();battleAnimLoop();
}

function animLoop(){animFrame=requestAnimationFrame(animLoop);if(mapData)drawOverlay();}
function battleAnimLoop(){battleAnimFrame=requestAnimationFrame(battleAnimLoop);if(curEnemy)drawBattle();}

function drawMap(){
  if(!mapCtx||!mapData)return;
  const ctx=mapCtx,W=13,H=13;
  ctx.clearRect(0,0,W*TILE,H*TILE);
  mapData.forEach((row,y)=>row.forEach((cell,x)=>{
    const px=x*TILE,py=y*TILE;
    if(!cell.vis){if(cell.seen){ctx.fillStyle='#050510';ctx.fillRect(px,py,TILE,TILE);}return;}
    if(cell.type==='wall'){
      ctx.fillStyle='#0c0c1e';ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle='#181832';ctx.lineWidth=.5;ctx.strokeRect(px+.5,py+.5,TILE-1,TILE-1);
      ctx.fillStyle='#1a1a38';ctx.fillRect(px,py,TILE,3);
    } else {
      ctx.fillStyle='#0d0d22';ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle='#121228';ctx.lineWidth=.3;ctx.strokeRect(px,py,TILE,TILE);
      const obj=cell.obj;
      if(obj==='player')drawPlayer(ctx,px,py);
      else if(obj==='enemy')drawEnemyTile(ctx,px,py,false);
      else if(obj==='boss')drawEnemyTile(ctx,px,py,true);
      else if(obj==='chest')drawChest(ctx,px,py);
      else if(obj==='exit')drawExit(ctx,px,py);
      else if(obj==='shop')drawIcon(ctx,px,py,'#9c27b0','🏪');
      else if(obj==='npc')drawIcon(ctx,px,py,'#2196f3','🗣');
      else if(obj==='save')drawIcon(ctx,px,py,'#00bcd4','💾');
    }
  }));
}

function drawPlayer(ctx,px,py){
  const t=Date.now()/400;
  ctx.fillStyle='#0f3460';ctx.fillRect(px+6,py+8,TILE-12,TILE-10);
  ctx.fillStyle='#1a1a4a';ctx.fillRect(px+4,py+12,TILE-8,TILE-14);
  ctx.fillStyle='#e8d5a3';ctx.beginPath();ctx.arc(px+TILE/2,py+10,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#999';ctx.fillRect(px+TILE/2-7,py+4,14,6);
  ctx.strokeStyle='#ddd';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px+TILE-6,py+10+Math.sin(t)*2);ctx.lineTo(px+TILE-6,py+28+Math.sin(t)*2);ctx.stroke();
  ctx.strokeStyle=`rgba(233,69,96,${.28+Math.sin(t*2)*.12})`;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2,TILE/2-2,0,Math.PI*2);ctx.stroke();
}

function drawEnemyTile(ctx,px,py,isBoss){
  const t=Date.now()/300;
  const cx=px+TILE/2, cy=py+TILE/2;
  const bob=Math.sin(t*1.2+px*0.3)*2;
  if(isBoss){
    const boss=BOSSES[Math.min(floor,19)];
    // Pulsing blood-red halo
    const haloA=0.18+Math.sin(t*2.5)*0.1;
    ctx.strokeStyle=`rgba(180,0,60,${haloA})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cx,cy+bob,TILE/2-1,0,Math.PI*2);ctx.stroke();
    // Dark purple body
    ctx.fillStyle='#1a0028';
    ctx.beginPath();ctx.arc(cx,cy+bob,10,0,Math.PI*2);ctx.fill();
    // Jagged crown spikes
    ctx.fillStyle='#8b0000';
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2-Math.PI/2;
      const ix=cx+Math.cos(a)*7, iy=cy+bob+Math.sin(a)*7;
      const ox=cx+Math.cos(a)*13, oy=cy+bob+Math.sin(a)*13;
      ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(ox,oy);ctx.lineTo(ox+Math.cos(a+0.3)*4,oy+Math.sin(a+0.3)*4);ctx.closePath();ctx.fill();
    }
    // Glowing eye
    ctx.fillStyle=`rgba(255,50,50,${0.7+Math.sin(t*4)*0.3})`;
    ctx.beginPath();ctx.arc(cx,cy+bob,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(cx,cy+bob,1.5,0,Math.PI*2);ctx.fill();
  } else {
    // Skull-faced enemy
    const floorType=Math.floor(floor/2)%5;
    const colors=['#661111','#114422','#221144','#442200','#001144'];
    const eyeColors=['#ff3333','#33ff66','#aa44ff','#ffaa00','#00aaff'];
    const bc=colors[floorType], ec=eyeColors[floorType];
    // Body shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();ctx.ellipse(cx,cy+bob+10,8,4,0,0,Math.PI*2);ctx.fill();
    // Body
    ctx.fillStyle=bc;
    ctx.beginPath();ctx.arc(cx,cy+bob,9,0,Math.PI*2);ctx.fill();
    // Cracked skull top
    ctx.fillStyle='#1a1a1a';ctx.fillRect(cx-5,cy+bob-11,10,5);
    // Glowing eyes
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.arc(cx-3.5,cy+bob-1,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3.5,cy+bob-1,2.5,0,Math.PI*2);ctx.fill();
    // Pupils
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(cx-3.5,cy+bob-1,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3.5,cy+bob-1,1,0,Math.PI*2);ctx.fill();
    // Jagged mouth
    ctx.strokeStyle='#000';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-4,cy+bob+3);
    ctx.lineTo(cx-2,cy+bob+5);ctx.lineTo(cx,cy+bob+3);ctx.lineTo(cx+2,cy+bob+5);ctx.lineTo(cx+4,cy+bob+3);
    ctx.stroke();
    // Aura pulse
    const pa=0.1+Math.sin(t*2+px)*0.07;
    ctx.strokeStyle=`${ec}${Math.round(pa*255).toString(16).padStart(2,'0')}`;
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy+bob,TILE/2-3,0,Math.PI*2);ctx.stroke();
  }
}

function drawChest(ctx,px,py){
  ctx.fillStyle='#3d1f00';ctx.fillRect(px+5,py+12,TILE-10,TILE-16);
  ctx.fillStyle='#8b4513';ctx.fillRect(px+5,py+12,TILE-10,8);
  ctx.fillStyle='#f5a623';ctx.fillRect(px+TILE/2-3,py+18,6,4);
  ctx.strokeStyle='#f5a623';ctx.lineWidth=1;ctx.strokeRect(px+5,py+12,TILE-10,TILE-16);
  const a=.3+Math.sin(Date.now()/500)*.18;
  ctx.fillStyle=`rgba(245,166,35,${a})`;ctx.fillRect(px+5,py+12,TILE-10,2);
}

function drawExit(ctx,px,py){
  ctx.fillStyle='#0a2a1a';ctx.fillRect(px+8,py+4,TILE-16,TILE-6);
  ctx.strokeStyle='#4caf50';ctx.lineWidth=2;ctx.strokeRect(px+8,py+4,TILE-16,TILE-6);
  ctx.fillStyle='#4caf50';ctx.fillRect(px+TILE/2-2,py+8,4,TILE-14);ctx.fillRect(px+TILE/2-6,py+12,12,4);
  const a=.18+Math.sin(Date.now()/600)*.12;
  ctx.fillStyle=`rgba(76,175,80,${a})`;ctx.fillRect(px+6,py+2,TILE-12,TILE-4);
}

function drawIcon(ctx,px,py,col,emoji){
  ctx.fillStyle=col+'33';ctx.fillRect(px+4,py+4,TILE-8,TILE-8);
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.strokeRect(px+4,py+4,TILE-8,TILE-8);
  ctx.font='14px serif';ctx.textAlign='center';ctx.fillText(emoji,px+TILE/2,py+TILE/2+5);
}

function drawOverlay(){
  if(!overlayCtx||!mapData)return;
  const ctx=overlayCtx,W=13,H=13;
  ctx.clearRect(0,0,W*TILE,H*TILE);
  mapData.forEach((row,y)=>row.forEach((cell,x)=>{
    if(!cell.vis){ctx.fillStyle=cell.seen?'rgba(2,2,8,.72)':'rgba(2,2,8,.97)';ctx.fillRect(x*TILE,y*TILE,TILE,TILE);}
  }));
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vy+=.05;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);ctx.globalAlpha=1;});
  drawMap();
}

function spawnParticles(x,y,col,n=10){
  for(let i=0;i<n;i++)particles.push({x:x*TILE+TILE/2,y:y*TILE+TILE/2,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4-1,life:1,decay:.04+Math.random()*.04,color:col,r:2+Math.random()*3});
}

// Battle canvas
function drawBattle(){
  if(!battleCtx||!curEnemy)return;
  const ctx=battleCtx,W=480,H=300,t=Date.now()/1000;
  ctx.clearRect(0,0,W,H);
  const fi=Math.min(floor,19);
  // Dungeon BG with atmospheric depth
  ctx.fillStyle='#020208';ctx.fillRect(0,0,W,H);
  // Back wall
  ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H*0.65);
  // Stone wall texture
  for(let row=0;row<5;row++){for(let col=0;col<12;col++){
    const stoneX=col*44+(row%2)*22,stoneY=row*28+10;
    const shade=0.03+Math.sin(col*7+row*13)*0.015;
    ctx.fillStyle=`rgba(20,20,40,${shade})`;
    ctx.fillRect(stoneX,stoneY,40,24);
    ctx.strokeStyle='rgba(15,15,30,0.4)';ctx.lineWidth=0.5;ctx.strokeRect(stoneX,stoneY,40,24);
  }}
  // Floor
  ctx.fillStyle='#080818';ctx.fillRect(0,H-70,W,70);
  for(let i=0;i<W;i+=44){ctx.strokeStyle='#0c0c22';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(i,H-70);ctx.lineTo(i,H);ctx.stroke();}
  ctx.strokeStyle='#0c0c22';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(0,H-35);ctx.lineTo(W,H-35);ctx.stroke();
  // Atmospheric fog layer
  const fogA=0.04+Math.sin(t*0.3)*0.02;
  ctx.fillStyle=`rgba(20,0,40,${fogA})`;ctx.fillRect(0,H-100,W,100);
  // Pillars
  [[30,H-160],[W-54,H-160]].forEach(([px,py])=>{
    ctx.fillStyle='#070718';ctx.fillRect(px,py,24,90);
    ctx.strokeStyle='#111128';ctx.lineWidth=1;ctx.strokeRect(px,py,24,90);
    // Pillar highlights
    ctx.fillStyle='#0c0c22';ctx.fillRect(px+2,py,4,90);
    // Capital
    ctx.fillStyle='#090920';ctx.fillRect(px-3,py,30,10);
  });
  // Torches with bigger glow for late floors
  const torchIntensity=1+fi*0.04;
  drawTorch(ctx,60,H-110,t,torchIntensity);drawTorch(ctx,W-60,H-110,t,torchIntensity);
  // Blood stains on floor for late floors
  if(fi>=10){
    ctx.fillStyle=`rgba(100,0,0,${0.08+fi*0.005})`;
    ctx.beginPath();ctx.ellipse(W*0.6,H-40,30,12,0.3,0,Math.PI*2);ctx.fill();
  }
  // Enemy - positioned higher for taller bosses
  const eshk=enemyShake>0?(Math.random()-.5)*enemyShake*6:0;
  const bob=Math.sin(t*1.5)*4;
  const enemyBaseY=fi>=18?H-85:(fi>=14?H-80:(fi>=8?H-78:H-72));
  drawBossGraphic(ctx,310+eshk,enemyBaseY+bob,curEnemy,t,bossPhase2);
  if(enemyShake>0)enemyShake=Math.max(0,enemyShake-.1);
  // Player
  const poff=playerAtkAnim>0?playerAtkAnim*60:0;
  drawBattlePlayer(ctx,110+poff,H-68,t,playerAtkAnim>0);
  if(playerAtkAnim>0)playerAtkAnim=Math.max(0,playerAtkAnim-.07);
  // Magic / skill FX
  if(magicAnim>0){
    const mc=bossPhase2?'rgba(255,0,80':'rgba(142,68,173';
    for(let i=0;i<14;i++){const a=(i/14)*Math.PI*2+t*5,r=50+magicAnim*32;const mx=310+Math.cos(a)*r,my=enemyBaseY-25+Math.sin(a)*r*.45;ctx.fillStyle=`${mc},${magicAnim*.8})`;ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();}
    ctx.strokeStyle=`${mc},${magicAnim*.5})`;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(310,enemyBaseY-25,50+magicAnim*32,0,Math.PI*2);ctx.stroke();
    // Inner ring
    ctx.strokeStyle=`${mc},${magicAnim*.3})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(310,enemyBaseY-25,30+magicAnim*20,0,Math.PI*2);ctx.stroke();
    magicAnim=Math.max(0,magicAnim-.03);
  }
}

function drawTorch(ctx,x,y,t,intensity=1){
  ctx.fillStyle='#3d1f00';ctx.fillRect(x-3,y,6,16);
  const flicker=Math.sin(t*8+x)*.3;
  const r=22*intensity;
  const gr=ctx.createRadialGradient(x,y,0,x,y,r);
  gr.addColorStop(0,`rgba(255,190,0,${(.85+flicker)*Math.min(intensity,1.2)})`);
  gr.addColorStop(.35,`rgba(255,100,0,${.4+flicker*.5})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,210,60,${.9+flicker})`;ctx.beginPath();ctx.moveTo(x,y-12);ctx.lineTo(x-5,y);ctx.lineTo(x+5,y);ctx.closePath();ctx.fill();
}

function drawBossGraphic(ctx,x,y,boss,t,phase2){
  ctx.save();ctx.translate(x,y);
  const fi=Math.min(floor,19);
  const rage=phase2;

  // Per-boss unique designs based on floor index
  if(fi<=1){
    // Goblin King / Skeleton General — hunched humanoid
    const bc=rage?'#cc2200':(fi===0?'#4a1a00':'#888888');

    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.ellipse(0,18,22,7,0,0,Math.PI*2);ctx.fill();

    // Claws
    ctx.strokeStyle=rage?'#ff4400':'#ffcc00';ctx.lineWidth=2;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-17+i*2,-2);ctx.lineTo(-20+i*2,8);ctx.stroke();}
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(29+i*2,-2);ctx.lineTo(32+i*2,8);ctx.stroke();}
    // Head with horns
    ctx.fillStyle=fi===0?'#5a2200':'#aaaaaa';ctx.beginPath();ctx.arc(0,-28,18,0,Math.PI*2);ctx.fill();
    // Horns
    ctx.fillStyle=rage?'#ff2200':'#442200';
    ctx.beginPath();ctx.moveTo(-10,-42);ctx.lineTo(-6,-28);ctx.lineTo(-16,-28);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(10,-42);ctx.lineTo(16,-28);ctx.lineTo(6,-28);ctx.closePath();ctx.fill();
    // Eyes
    const eyeC=rage?'#ff0000':'#ffcc00';
    ctx.fillStyle=eyeC;ctx.beginPath();ctx.arc(-7,-29,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,-29,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-7,-29,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,-29,1.5,0,Math.PI*2);ctx.fill();
    // Jagged mouth
    ctx.strokeStyle='#000';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-8,-22);for(let i=0;i<5;i++)ctx.lineTo(-8+i*4,rage?-16+(i%2)*5:-20+(i%2)*4);ctx.lineTo(8,-22);ctx.stroke();
  } else if(fi<=3){

      ctx.fillStyle=bc;ctx.beginPath();ctx.ellipse(0,0,26,30,0,0,Math.PI*2);ctx.fill();
      // Axe
      ctx.fillStyle='#666';ctx.fillRect(22,-10,6,30);
      ctx.fillStyle='#888';ctx.beginPath();ctx.moveTo(28,-18);ctx.lineTo(44,-8);ctx.lineTo(44,12);ctx.lineTo(28,4);ctx.closePath();ctx.fill();
      // Head
      ctx.fillStyle=rage?'#aa2200':'#226600';ctx.beginPath();ctx.arc(0,-36,20,0,Math.PI*2);ctx.fill();
      // Tusks
      ctx.fillStyle='#eeeeaa';ctx.beginPath();ctx.moveTo(-8,-22);ctx.lineTo(-12,-14);ctx.lineTo(-4,-18);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(8,-22);ctx.lineTo(12,-14);ctx.lineTo(4,-18);ctx.closePath();ctx.fill();
      // Eyes
      ctx.fillStyle=rage?'#ff0':'#ff4400';ctx.beginPath();ctx.arc(-7,-38,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,-38,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-7,-38,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,-38,2,0,Math.PI*2);ctx.fill();
    } else {
      // Banshee — ghostly wailing spirit
      const wail=Math.sin(t*4)*5;
      ctx.globalAlpha=0.85;
      // Wispy tail
      ctx.fillStyle=rage?'rgba(200,0,100,0.6)':'rgba(80,0,160,0.6)';
      ctx.beginPath();ctx.moveTo(-12,10);ctx.quadraticCurveTo(-20,30+wail,0,50);ctx.quadraticCurveTo(20,30+wail,12,10);ctx.closePath();ctx.fill();
      // Body
      ctx.fillStyle=rage?'#440028':'#1a0040';ctx.beginPath();ctx.ellipse(0,-5,18,28,0,0,Math.PI*2);ctx.fill();
      // Trailing arms
      ctx.fillStyle=rage?'rgba(180,0,80,0.7)':'rgba(100,0,200,0.7)';
      ctx.beginPath();ctx.moveTo(-18,-5);ctx.quadraticCurveTo(-38,-15+wail,-42,0);ctx.quadraticCurveTo(-38,8+wail,-18,5);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(18,-5);ctx.quadraticCurveTo(38,-15+wail,42,0);ctx.quadraticCurveTo(38,8+wail,18,5);ctx.closePath();ctx.fill();
      // Head
      ctx.fillStyle=rage?'#660033':'#2a0060';ctx.beginPath();ctx.arc(0,-34,18,0,Math.PI*2);ctx.fill();
      // Hollow screaming eyes
      ctx.fillStyle=rage?'#ff0066':'#cc44ff';
      ctx.beginPath();ctx.ellipse(-6,-36,4,6,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(6,-36,4,6,0,0,Math.PI*2);ctx.fill();
      // Gaping wailing mouth
      ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,-26,7,9+Math.abs(wail)*.3,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  } else if(fi<=6){

      // Snout
      ctx.fillStyle=rage?'#aa2200':'#5a2d00';ctx.beginPath();ctx.ellipse(0,-28,10,8,0,0,Math.PI*2);ctx.fill();

      ctx.fillStyle=rage?'#220011':'#001a00';ctx.beginPath();ctx.ellipse(0,-5,15,26,0,0,Math.PI*2);ctx.fill();

      for(let i=0;i<7;i++){

        ctx.strokeStyle=snakeCol;ctx.lineWidth=3;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.quadraticCurveTo((sx+ex)/2+Math.sin(t*3+i)*4,(sy+ey)/2,ex,ey);ctx.stroke();
        // Snake head
        ctx.fillStyle=rage?'#ff0033':'#00aa00';ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(ex,ey,1.2,0,Math.PI*2);ctx.fill();
      }
      // Face
      ctx.fillStyle=rage?'#440022':'#0a2a0a';ctx.beginPath();ctx.arc(0,-35,16,0,Math.PI*2);ctx.fill();
      // Stone-gaze eyes
      ctx.fillStyle=rage?'#ff00aa':'#00ff44';
      ctx.beginPath();ctx.ellipse(-6,-37,5,7,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(6,-37,5,7,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(-6,-37,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(6,-37,2,0,Math.PI*2);ctx.fill();
    } else {
      // Cyclops
      const bc=rage?'#660000':'#1a0a00';
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.ellipse(0,22,26,8,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=bc;ctx.beginPath();ctx.ellipse(0,0,24,28,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-30,-2,10,16,Math.PI/5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(30,-2,10,16,-Math.PI/5,0,Math.PI*2);ctx.fill();
      // Club
      ctx.fillStyle='#5a3a00';ctx.fillRect(28,-20,8,40);ctx.beginPath();ctx.arc(32,-20,12,0,Math.PI*2);ctx.fill();

      // Body

      // Head

      // Robe trim
      ctx.strokeStyle=rage?'#8800ff':'#4400aa';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-18,30);ctx.lineTo(-22,10);ctx.stroke();ctx.beginPath();ctx.moveTo(18,30);ctx.lineTo(22,10);ctx.stroke();
      // Bone arms
      ctx.strokeStyle=rage?'#aa00ff':'#8888aa';ctx.lineWidth=3;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-12,-10);ctx.quadraticCurveTo(-36,-18,-38,-6);ctx.stroke();

      ctx.beginPath();ctx.arc(-38,-6,6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(38,-6,6,0,Math.PI*2);ctx.fill();
      // Magic orb in hand
      const orbR=rage?'rgba(180,0,255,0.8)':'rgba(80,0,200,0.7)';
      ctx.fillStyle=orbR;ctx.beginPath();ctx.arc(-38,-6,4,0,Math.PI*2);ctx.fill();

      // Skull
      ctx.fillStyle=rage?'#440060':'#ccccdd';ctx.beginPath();ctx.arc(0,-36,18,0,Math.PI*2);ctx.fill();
      // Crown
      ctx.fillStyle=rage?'#ff00ff':'#ffaa00';
      for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2-Math.PI/2;const ir=17,or2=25;ctx.beginPath();ctx.moveTo(Math.cos(a)*ir,-36+Math.sin(a)*ir);ctx.lineTo(Math.cos(a)*or2,-36+Math.sin(a)*or2);ctx.lineWidth=3;ctx.strokeStyle=rage?'#ff00ff':'#ffaa00';ctx.stroke();}
      // Eye sockets
      ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(-7,-38,5,6,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(7,-38,5,6,0,0,Math.PI*2);ctx.fill();

      for(let row=0;row<6;row++){for(let col=0;col<4;col++){const sx=(col-1.5)*10,sy=row*8-16;ctx.beginPath();ctx.ellipse(sx,sy,5,4,0,0,Math.PI);ctx.stroke();}}
      // Tail
      ctx.strokeStyle=rage?'#440020':'#220040';ctx.lineWidth=10;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(0,20);ctx.quadraticCurveTo(20,35,15,50);ctx.quadraticCurveTo(10,60,0,55);ctx.stroke();
      // Neck
      ctx.fillStyle=rage?'#220028':'#110020';ctx.beginPath();ctx.moveTo(-10,-20);ctx.lineTo(-8,-40);ctx.lineTo(8,-40);ctx.lineTo(10,-20);ctx.closePath();ctx.fill();
      // Massive dragon head
      ctx.fillStyle=rage?'#330030':'#1a0030';ctx.beginPath();ctx.arc(0,-54,22,0,Math.PI*2);ctx.fill();
      // Skull-like snout
      ctx.fillStyle=rage?'#440038':'#220040';ctx.beginPath();ctx.moveTo(-12,-48);ctx.lineTo(-14,-36);ctx.lineTo(14,-36);ctx.lineTo(12,-48);ctx.closePath();ctx.fill();
      // Huge curved horns
      ctx.strokeStyle=rage?'#aa0066':'#440088';ctx.lineWidth=6;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-16,-64);ctx.quadraticCurveTo(-38,-72,-35,-55);ctx.stroke();
      ctx.beginPath();ctx.moveTo(16,-64);ctx.quadraticCurveTo(38,-72,35,-55);ctx.stroke();
      // Inner horns
      ctx.lineWidth=3;ctx.strokeStyle=rage?'#cc0088':'#6600aa';
      ctx.beginPath();ctx.moveTo(-10,-66);ctx.quadraticCurveTo(-22,-76,-20,-62);ctx.stroke();
      ctx.beginPath();ctx.moveTo(10,-66);ctx.quadraticCurveTo(22,-76,20,-62);ctx.stroke();
      // Nostrils
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-4,-38,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-38,2.5,0,Math.PI*2);ctx.fill();
      // Fang rows
      ctx.fillStyle='#dddddd';
      [-10,-5,0,5,10].forEach(fx=>{ctx.beginPath();ctx.moveTo(fx,-34);ctx.lineTo(fx-1.5,-28);ctx.lineTo(fx+1.5,-28);ctx.closePath();ctx.fill();});
      // Massive glowing dragon eyes
      ctx.fillStyle='#ffffff';ctx.beginPath();ctx.ellipse(-9,-55,7,9,0.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(9,-55,7,9,-0.2,0,Math.PI*2);ctx.fill();
      const dEye=rage?'#ff0000':'#cc00ff';
      ctx.fillStyle=dEye;ctx.beginPath();ctx.ellipse(-9,-55,5,7,0.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(9,-55,5,7,-0.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-9,-55,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(9,-55,2.5,0,Math.PI*2);ctx.fill();
      // Eye glow rings
      const eg3=0.25+Math.sin(dt*3)*0.12;
      ctx.strokeStyle=rage?`rgba(255,0,0,${eg3*2})`:`rgba(200,0,255,${eg3})`;ctx.lineWidth=3;
      ctx.beginPath();ctx.ellipse(-9,-55,10,12,0.2,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.ellipse(9,-55,10,12,-0.2,0,Math.PI*2);ctx.stroke();
      // Aura
      const aurA=0.15+Math.sin(dt*2.5)*0.07;
      ctx.strokeStyle=rage?`rgba(255,0,80,${aurA*2})`:`rgba(140,0,220,${aurA})`;
      ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,-30,50,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }

  // Restore translate, then draw label in absolute coords
  ctx.restore();
  const nc=rage?'#ff4444':(boss.col||'#cc44ff');
  ctx.fillStyle=nc;ctx.font='bold 11px Georgia';ctx.textAlign='center';
  const labelY=fi>=18?y-98:(fi>=15?y-84:(fi>=10?y-76:(fi>=7?y-70:y-62)));
  ctx.fillText(boss.name,x,labelY);
  if(rage){ctx.fillStyle='rgba(255,80,50,0.9)';ctx.font='10px Georgia';ctx.fillText('【フェーズ2】',x,labelY+13);}
}

function drawBattlePlayer(ctx,x,y,t,attacking){
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='#1a1a4a';ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(12,0);ctx.lineTo(10,28);ctx.lineTo(-10,28);ctx.closePath();ctx.fill();
  ctx.fillStyle='#0f3460';ctx.fillRect(-10,-10,20,24);
  ctx.fillStyle='#e8d5a3';ctx.beginPath();ctx.arc(0,-18,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#888';ctx.fillRect(-10,-26,20,10);ctx.fillStyle='#aaa';ctx.fillRect(-8,-28,16,5);
  const sw=attacking?18:Math.sin(t)*2.5;
  ctx.strokeStyle='#ddd';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(13,-10+sw*.3);ctx.lineTo(13+sw,17);ctx.stroke();
  ctx.strokeStyle='#aaa';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(7,4+sw*.1);ctx.lineTo(19,4+sw*.1);ctx.stroke();
  ctx.restore();
}

// ===== GAME STATE =====
let P,mapData,floor,curEnemy,inBattle,guardNext,bossPhase2,battleLocked,regenTurns=0;
let chestCount=0,bossesDefeated=0,Q;

const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}
function log(msg,cls=''){
  const l=$('log');if(!l)return;
  const p=document.createElement('p');if(cls)p.className=cls;
  p.textContent=msg;l.appendChild(p);l.scrollTop=l.scrollHeight;
  while(l.children.length>20)l.removeChild(l.firstChild);
}

function startGame(){
  initAudio();
  floor=0;chestCount=0;bossesDefeated=0;guardNext=false;bossPhase2=false;inBattle=false;regenTurns=0;
  P={x:1,y:1,hp:120,maxHp:120,mp:50,maxMp:50,atk:12,def:5,xp:0,xpNext:60,level:1,gold:50,
     inventory:['薬草','薬草','薬草','MP回復薬'],skills:['slash','heal'],
     kills:{},totalKills:0,steps:0,bossKills:0};
  Q=JSON.parse(JSON.stringify(QUESTS));
  initCanvases();loadFloor(0);show('map-sc');
  startBGM('explore');
  log('⚔️ 20階のダンジョンへ挑む！暗黒竜エクシオンを倒せ！','c');
}

function loadFloor(f){
  floor=f;
  const seed=f*999+12345;
  const grid=genMap(seed);
  mapData=grid.map(row=>row.map(v=>({type:v===1?'wall':'floor',obj:null,vis:false,seen:false})));
  const ec=3+Math.floor(f/2),cc=2+Math.floor(f/3);
  placeRand(ec,'enemy');placeRand(cc,'chest');
  // Boss at bottom-right area
  const bx=11,by=11;
  mapData[by][bx].obj='boss';
  // Exit at bottom-left
  if(f<19){mapData[11][1].obj='exit';}
  // Shop and NPC
  mapData[1][11].obj='shop';
  mapData[6][1].obj='npc';
  if(f>0)mapData[1][5].obj='save';
  // Place player — guarantee start cell and neighbours are walkable floor
  [[1,1],[1,2],[2,1],[1,3],[3,1]].forEach(([cy,cx])=>{
    if(mapData[cy]&&mapData[cy][cx]) mapData[cy][cx].type='floor';
  });
  if(mapData[1][1].obj&&mapData[1][1].obj!=='player') mapData[1][1].obj=null;
  mapData[1][1].obj='player';P.x=1;P.y=1;
  updateFOV();drawMap();updateHUD();
  $('fld').textContent=f+1;
}

function placeRand(n,type){
  let placed=0,tries=0;
  while(placed<n&&tries<400){
    tries++;const x=1+Math.floor(Math.random()*11),y=1+Math.floor(Math.random()*11);
    const c=mapData[y]?.[x];
    if(c&&c.type==='floor'&&!c.obj&&!(x===1&&y===1)){c.obj=type;placed++;}
  }
}

function updateFOV(){
  const R=4;
  for(let y=0;y<13;y++)for(let x=0;x<13;x++)mapData[y][x].vis=false;
  for(let dy=-R;dy<=R;dy++)for(let dx=-R;dx<=R;dx++){
    if(dx*dx+dy*dy>R*R)continue;
    const nx=P.x+dx,ny=P.y+dy;
    if(mapData[ny]?.[nx]){mapData[ny][nx].vis=true;mapData[ny][nx].seen=true;}
  }
}

function updateHUD(){
  $('hpb').style.width=(P.hp/P.maxHp*100)+'%';
  $('mpb').style.width=(P.mp/P.maxMp*100)+'%';
  $('xpb').style.width=(P.xp/P.xpNext*100)+'%';
  $('lvd').textContent=P.level;$('gd').textContent=P.gold;
  $('atkd').textContent=P.atk;$('defd').textContent=P.def;$('fld').textContent=floor+1;
  renderInv();renderSkills();checkQuestsPassive();
}

function renderInv(){
  const iv=$('ivl');if(!iv)return;
  const cnt={};P.inventory.forEach(i=>cnt[i]=(cnt[i]||0)+1);
  iv.innerHTML=Object.entries(cnt).map(([n,c])=>`<span class="itm" onclick="useItemMap('${n}')">${n}×${c}</span>`).join('')||'<span style="color:#2a2a2a;font-size:11px">なし</span>';
}

function renderSkills(){
  const sk=$('skl');if(!sk)return;
  sk.innerHTML=P.skills.map(id=>{const s=SKILLS.find(s=>s.id===id);return s?`<button class="sk-btn" title="${s.desc}">${s.icon}${s.name}(${s.mpCost})</button>`:''}).join('');
}

function useItemMap(name){
  const idx=P.inventory.indexOf(name);if(idx===-1)return;
  P.inventory.splice(idx,1);
  const mpItems={'MP回復薬':30,'ハイMP薬':60,'マナエリクサー':-1};
  const hpItems={'薬草':30,'大回復薬':80,'エリクサー':200,'フルポーション':-1};
  if(name in mpItems){const v=mpItems[name];P.mp=v<0?P.maxMp:Math.min(P.maxMp,P.mp+v);log(`💧 ${name}でMP回復！`,'g');}
  else if(name in hpItems){const v=hpItems[name];P.hp=v<0?P.maxHp:Math.min(P.maxHp,P.hp+v);log(`🧪 ${name}でHP回復！`,'g');}
  updateHUD();
}

function move(dx,dy){
  if(inBattle)return;
  const nx=P.x+dx,ny=P.y+dy;
  const c=mapData[ny]?.[nx];
  if(!c||c.type==='wall')return;
  const obj=c.obj;
  // 敵・ボス: 踏んでバトル
  if(obj==='enemy'){startBattle(nx,ny,false);return;}
  if(obj==='boss'){startBattle(nx,ny,true);return;}
  // 宝箱・出口: 踏んで発動
  if(obj==='chest'){
    mapData[P.y][P.x].obj=null;P.x=nx;P.y=ny;P.steps++;
    mapData[ny][nx].obj='player';
    sfxStep();updateFOV();drawMap();
    openChest(nx,ny);return;
  }
  if(obj==='exit'){nextFloor();return;}
  // 店・NPC・セーブ: 通過可能。隣接マスから話しかけ or 踏んでも発動
  if(obj==='shop'){enterShop();return;}
  if(obj==='npc'){enterNPC();return;}
  if(obj==='save'){showSave();return;}
  // 通常移動
  mapData[P.y][P.x].obj=null;P.x=nx;P.y=ny;P.steps++;
  mapData[ny][nx].obj='player';
  sfxStep();updateFOV();drawMap();
}

function openChest(x,y){
  chestCount++;
  // Player is now on this cell; clear chest obj and set player
  mapData[y][x].obj='player';
  spawnParticles(x,y,'#f5a623',12);sfxChest();
  const r=Math.random(),tier=Math.floor(floor/4);
  if(r<.2){P.inventory.push('薬草');log('📦 薬草！','g');}
  else if(r<.35){const it=tier>=2?'エリクサー':tier>=1?'大回復薬':'薬草';P.inventory.push(it);log(`📦 ${it}！`,'g');}
  else if(r<.48){const it=tier>=3?'ハイMP薬':'MP回復薬';P.inventory.push(it);log(`📦 ${it}！`,'g');}
  else if(r<.62){const sc=SKILLS.find(s=>!P.skills.includes(s.id));if(sc){P.skills.push(sc.id);log(`📦 スキル「${sc.name}」習得！`,'b');}else{const g=30+tier*20+Math.floor(Math.random()*50);P.gold+=g;log(`📦 ${g}G！`,'y');}}
  else{const g=25+tier*25+Math.floor(Math.random()*60);P.gold+=g;log(`📦 ${g}G！`,'y');}
  checkQuestKill(null,true);updateHUD();
}

function nextFloor(){
  if(floor>=19){winGame();return;}
  floor++;P.x=1;P.y=1;
  log(`🚪 ${floor+1}階へ進んだ！`,'c');
  loadFloor(floor);show('map-sc');
}

function enterShop(){show('shop-sc');renderShop();}
function enterNPC(){const idx=Math.min(Math.floor(floor/2.5),NPC_TEXTS.length-1);$('npc-text').textContent=NPC_TEXTS[idx];show('npc-sc');}
function leaveShop(){show('map-sc');updateHUD();}

function renderShop(){
  $('shop-g').textContent=`所持金：${P.gold}G (${floor+1}階)`;
  const tier=Math.floor(floor/4);
  $('shop-items').innerHTML=SHOP_ITEMS.filter((_,i)=>{
    if(i<4)return true;if(i<7)return floor>=2;if(i<11)return floor>=3;
    if(i<13)return floor>=5;if(i<15)return floor>=8;return floor>=4;
  }).map((it,_,arr)=>{
    const i=SHOP_ITEMS.indexOf(it);
    return `<div class="shoprow"><span>${it.icon} <b>${it.name}</b> ${it.desc}</span><button ${P.gold<it.cost?'disabled':''} onclick="buyItem(${i})">${it.cost}G</button></div>`;
  }).join('');
}

function buyItem(i){
  const it=SHOP_ITEMS[i];if(!it||P.gold<it.cost)return;
  P.gold-=it.cost;
  if(it.type==='heal')P.inventory.push(it.name);
  else if(it.type==='mpHeal'||it.type==='mpFull')P.inventory.push(it.name);
  else if(it.type==='fullheal')P.inventory.push(it.name);
  else if(it.type==='atk'){P.atk+=it.val;log(`⚔️ ATK+${it.val}！`,'g');}
  else if(it.type==='def'){P.def+=it.val;log(`🛡 DEF+${it.val}！`,'g');}
  else if(it.type==='maxMp'){P.maxMp+=it.val;P.mp=Math.min(P.maxMp,P.mp+it.val);log(`🔮 最大MP+${it.val}！`,'b');}
  else if(it.type==='maxHp'){P.maxHp+=it.val;P.hp=Math.min(P.maxHp,P.hp+it.val);log(`❤️ 最大HP+${it.val}！`,'g');}
  renderShop();
}

// ===== BATTLE =====
function startBattle(ex,ey,isBoss){
  inBattle=true;guardNext=false;bossPhase2=false;battleLocked=false;regenTurns=0;
  const scaleFactor=1+floor*.12;
  if(isBoss){
    curEnemy=JSON.parse(JSON.stringify(BOSSES[Math.min(floor,19)]));
    curEnemy.hp=Math.round(curEnemy.hp);curEnemy.maxhp=curEnemy.hp;
  } else {
    const pool=ENEMY_POOL.slice(0,Math.min(3+Math.floor(floor/2),ENEMY_POOL.length));
    const base=JSON.parse(JSON.stringify(pool[Math.floor(Math.random()*pool.length)]));
    base.hp=Math.round(base.hp*scaleFactor);base.maxhp=base.hp;
    base.atk=Math.round(base.atk*scaleFactor);base.def=Math.round(base.def*(1+floor*.08));
    base.xp=Math.round(base.xp*scaleFactor);base.gold=Math.round(base.gold*scaleFactor);
    curEnemy=base;
  }
  curEnemy.ex=ex;curEnemy.ey=ey;curEnemy.isBoss=!!isBoss;
  $('enm-name').textContent=curEnemy.name+(isBoss?' 【ボス】 F'+( floor+1):'');
  $('phase-badge').textContent='';
  updateBHUD();
  show('battle-sc');
  stopBGM();startBGM(isBoss?(floor>=18?'final':'boss'):'battle');
  log(`${isBoss?'🔥':'⚔️'} ${curEnemy.name}が現れた！`,'r');
  $('skill-btns').style.display='none';$('battle-btns').style.display='flex';
}

function updateBHUD(){
  $('bhpb').style.width=(P.hp/P.maxHp*100)+'%';
  $('bmpb').style.width=(P.mp/P.maxMp*100)+'%';
  $('bgd').textContent=P.gold;$('batkd').textContent=P.atk;$('bdefd').textContent=P.def;
  $('ehpt').textContent=`${Math.max(0,curEnemy.hp)}/${curEnemy.maxhp}`;
  $('ehpb').style.width=(Math.max(0,curEnemy.hp)/curEnemy.maxhp*100)+'%';
}

function ba(act){
  if(battleLocked)return;
  if(act==='skill'){
    $('battle-btns').style.display='none';
    const sb=$('skill-btns');sb.style.display='flex';
    sb.innerHTML=P.skills.map(id=>{const s=SKILLS.find(s=>s.id===id);return s?`<button onclick="useSkill('${id}')" ${P.mp<s.mpCost?'disabled':''}>${s.icon}${s.name}(${s.mpCost})</button>`:''}).join('')+'<button onclick="cancelSkill()">キャンセル</button>';
    return;
  }
  if(act==='attack'){
    const dmg=Math.max(1,P.atk-curEnemy.def+Math.floor(Math.random()*7));
    curEnemy.hp-=dmg;playerAtkAnim=1;sfxAtk();log(`⚔️ ${dmg}ダメージ！`,'g');
  } else if(act==='magic'){
    if(P.mp<10){log('💧 MPが足りない！','r');return;}
    P.mp-=10;const dmg=Math.floor(P.atk*2.2+Math.random()*9);
    curEnemy.hp-=dmg;magicAnim=1;sfxMag();log(`✨ 魔法で${dmg}ダメージ！`,'b');
  } else if(act==='item'){
    const pri=['フルポーション','エリクサー','大回復薬','薬草'];
    let used=false;
    for(const nm of pri){const idx=P.inventory.indexOf(nm);if(idx!==-1){P.inventory.splice(idx,1);const v={薬草:30,大回復薬:80,エリクサー:200,'フルポーション':-1}[nm];P.hp=v<0?P.maxHp:Math.min(P.maxHp,P.hp+v);log(`🧪 ${nm}でHP回復！`,'g');used=true;break;}}
    if(!used){log('🧪 回復アイテムがない！','r');return;}
  } else if(act==='run'){
    if(curEnemy.isBoss){log('🚫 ボスからは逃げられない！','r');return;}
    if(Math.random()<.45){log('🏃 逃走成功！','c');endBattle(false);return;}
    else log('逃げられなかった！','r');
  }
  if(curEnemy.hp<=0){battleLocked=true;enemyShake=3;setTimeout(()=>battleWin(),600);return;}
  checkPhase2();enemyTurnAndRegen();
}

function useSkill(id){
  const s=SKILLS.find(s=>s.id===id);if(!s||P.mp<s.mpCost)return;
  P.mp-=s.mpCost;
  $('skill-btns').style.display='none';$('battle-btns').style.display='flex';
  if(s.guard){guardNext=true;log(`🛡 鉄壁！次撃ダメージ激減！`,'b');}
  else if(s.regen){regenTurns=3;log(`💫 再生！3ターンHP回復！`,'b');}
  else if(s.heal){const h=Math.floor(P.maxHp*(s.id==='fullheal'?1:s.heal));P.hp=Math.min(P.maxHp,P.hp+h);log(`💚 HP+${h}！`,'g');}
  else{
    const dmg=Math.floor(P.atk*s.dmgMul+Math.random()*12);
    curEnemy.hp-=dmg;magicAnim=1.5;sfxMag();log(`${s.icon} ${s.name}で${dmg}の大ダメージ！`,'b');
    if(s.stun&&Math.random()<.38){log('⚡ 麻痺！（1ターン休み）','c');updateBHUD();if(curEnemy.hp<=0){battleLocked=true;setTimeout(()=>battleWin(),600);}return;}
    if(s.freeze&&Math.random()<.35){log('❄️ 凍結！（1ターン休み）','c');updateBHUD();if(curEnemy.hp<=0){battleLocked=true;setTimeout(()=>battleWin(),600);}return;}
  }
  if(curEnemy.hp<=0){battleLocked=true;enemyShake=3;setTimeout(()=>battleWin(),600);return;}
  checkPhase2();enemyTurnAndRegen();
}

function checkPhase2(){
  if(curEnemy.isBoss&&!bossPhase2&&curEnemy.hp<=curEnemy.maxhp/2){
    bossPhase2=true;curEnemy.atk=curEnemy.p2a;
    $('enm-name').textContent=curEnemy.p2n;
    $('phase-badge').textContent='⚡ フェーズ2突入！攻撃力大幅上昇！';
    log(`💥 ${curEnemy.p2n}！真の力が解放された！`,'r');
  }
}

function cancelSkill(){$('skill-btns').style.display='none';$('battle-btns').style.display='flex';}

function enemyTurnAndRegen(){
  // Regen
  if(regenTurns>0){const rh=Math.floor(P.maxHp*.08);P.hp=Math.min(P.maxHp,P.hp+rh);regenTurns--;log(`💫 再生でHP+${rh}（残${regenTurns}T）`,'g');}
  // Enemy attack
  let edm=Math.max(1,curEnemy.atk-P.def+Math.floor(Math.random()*6));
  if(guardNext){edm=Math.max(1,Math.floor(edm*.28));guardNext=false;log(`🛡 鉄壁で${edm}に軽減！`,'g');}
  else{sfxHurt();log(`👾 ${curEnemy.name}の攻撃！${edm}ダメージ！`,'r');}
  P.hp-=edm;
  updateBHUD();
  if(P.hp<=0){setTimeout(()=>{sfxGO();stopBGM();show('go-sc');},600);}
}

function battleWin(){
  sfxVic();P.gold+=curEnemy.gold;P.xp+=curEnemy.xp;
  P.kills[curEnemy.name]=(P.kills[curEnemy.name]||0)+1;P.totalKills++;
  log(`🏆 勝利！${curEnemy.xp}XP・${curEnemy.gold}G！`,'y');
  if(curEnemy.isBoss){bossesDefeated++;P.bossKills++;log(`🌟 ボス討伐！(${bossesDefeated}/20)`,'b');}
  while(P.xp>=P.xpNext)levelUp();
  mapData[curEnemy.ey][curEnemy.ex].obj=null;
  endBattle(true);checkQuestKill(curEnemy.name,false);
}

function levelUp(){
  P.xp-=P.xpNext;P.level++;P.xpNext=Math.floor(P.xpNext*1.55);
  P.maxHp+=20;P.hp=P.maxHp;P.maxMp+=12;P.mp=P.maxMp;P.atk+=5;P.def+=2;
  sfxLvl();
  if(P.level%3===0){const sc=SKILLS.find(s=>!P.skills.includes(s.id));if(sc){P.skills.push(sc.id);log(`⭐ Lv.${P.level}！スキル「${sc.name}」習得！`,'b');}else log(`⭐ Lv.${P.level}！全ステータス上昇！`,'b');}
  else log(`⭐ Lv.${P.level}！HP・MP全回復！`,'b');
}

function endBattle(won){
  inBattle=false;guardNext=false;regenTurns=0;
  if(won){mapData[P.y][P.x].obj=null;P.x=curEnemy.ex;P.y=curEnemy.ey;mapData[P.y][P.x].obj='player';}
  stopBGM();startBGM('explore');
  show('map-sc');updateFOV();drawMap();updateHUD();
}

// ===== QUESTS =====
function checkQuestKill(name,isChest){
  Q.forEach(q=>{
    if(q.done)return;
    if(isChest&&q.type==='chest'&&chestCount>=q.need)completeQuest(q);
    if(name&&q.type==='kill'&&q.target===name&&(P.kills[name]||0)>=q.need)completeQuest(q);
    if(name&&q.type==='killAny'&&P.totalKills>=q.need)completeQuest(q);
    if(curEnemy&&curEnemy.isBoss&&q.type==='bossFloor'&&floor===q.bossFloor&&!q.done)completeQuest(q);
    if(q.type==='bossAll'&&bossesDefeated>=q.need)completeQuest(q);
    if(q.type==='skills'&&P.skills.length>=q.need)completeQuest(q);
  });
}
function checkQuestsPassive(){
  Q.forEach(q=>{if(!q.done&&q.type==='gold'&&P.gold>=q.need)completeQuest(q);});
}
function completeQuest(q){
  q.done=true;log(`📋 クエスト完了：${q.name}！`,'y');
  if(q.reward.gold){P.gold+=q.reward.gold;log(`💰 報酬${q.reward.gold}G！`,'y');}
  if(q.reward.item){P.inventory.push(q.reward.item);log(`🎁 ${q.reward.item}入手！`,'g');}
  updateHUD();
}
function getQProg(q){
  if(q.done)return '✅';
  if(q.type==='kill')return `(${P.kills[q.target]||0}/${q.need})`;
  if(q.type==='killAny')return `(${P.totalKills}/${q.need})`;
  if(q.type==='chest')return `(${chestCount}/${q.need})`;
  if(q.type==='gold')return `(${P.gold}/${q.need})`;
  if(q.type==='bossFloor')return `(${bossesDefeated>=q.bossFloor+1?1:0}/1)`;
  if(q.type==='bossAll')return `(${bossesDefeated}/${q.need})`;
  if(q.type==='skills')return `(${P.skills.length}/${q.need})`;
  return '';
}

function showQuests(){
  $('qlist').innerHTML=Q.map(q=>{
    const rw=[];if(q.reward&&q.reward.gold)rw.push(q.reward.gold+'G');if(q.reward&&q.reward.item)rw.push(q.reward.item);
    return `<div class="qrow ${q.done?'done':''}"><b>${q.done?'✅':'🔲'} ${q.name}</b><div style="color:#555;font-size:11px;margin-top:2px">${q.desc} ${getQProg(q)}</div>${q.done?'':'<div style="color:#f5a623;font-size:11px">報酬: '+rw.join('・')+'</div>'}</div>`;
  }).join('');
  show('quest-sc');
}

function showStats(){
  const cnt={};P.inventory.forEach(i=>cnt[i]=(cnt[i]||0)+1);
  $('stats-body').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;margin-bottom:9px">
    <div>❤️ HP: <b>${P.hp}/${P.maxHp}</b></div><div>💧 MP: <b>${P.mp}/${P.maxMp}</b></div>
    <div>⚔️ ATK: <b>${P.atk}</b></div><div>🛡 DEF: <b>${P.def}</b></div>
    <div>⭐ Lv: <b>${P.level}</b></div><div>💰 Gold: <b>${P.gold}</b></div>
    <div>💀 討伐: <b>${P.totalKills}</b></div><div>🐉 ボス: <b>${P.bossKills||0}/20</b></div>
    <div>👣 歩数: <b>${P.steps}</b></div><div>🗺 階層: <b>${floor+1}/20</b></div>
  </div>
  <div class="iv-title">スキル</div><div style="margin-bottom:7px">${P.skills.map(id=>{const s=SKILLS.find(s=>s.id===id);return s?`<span class="itm">${s.icon}${s.name}</span>`:''}).join('')}</div>
  <div class="iv-title">アイテム</div><div>${Object.entries(cnt).map(([n,c])=>`<span class="itm">${n}×${c}</span>`).join('')||'<span style="color:#222">なし</span>'}</div>`;
  show('stats-sc');
}

function showSave(){
  if(inBattle)return;
  const s=$('save-slots');
  s.innerHTML='<div class="iv-title" style="margin-bottom:7px">セーブスロット</div>';
  for(let i=1;i<=3;i++){
    let info='空きスロット';
    try{const d=JSON.parse(localStorage.getItem(`rpg3_save_${i}`));if(d)info=`Lv.${d.P.level} F${d.floor+1}/20 ${d.ts}`;}catch(e){}
    const div=document.createElement('div');div.className='save-row';
    div.innerHTML=`<span>スロット${i}: <span style="color:#555">${info}</span></span><div style="display:flex;gap:4px"><button onclick="saveGame(${i})">💾 保存</button><button onclick="loadSlot(${i})">📂 読込</button></div>`;
    s.appendChild(div);
  }
  show('save-sc');
}

function saveGame(slot){
  if(!P)return;
  const ts=new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  try{localStorage.setItem(`rpg3_save_${slot}`,JSON.stringify({P,floor,Q,chestCount,bossesDefeated,ts}));log(`💾 スロット${slot}セーブ！`,'c');showSave();}
  catch(e){log('⚠️ セーブ失敗','r');}
}

function loadSlot(slot){
  try{
    const d=JSON.parse(localStorage.getItem(`rpg3_save_${slot}`));
    if(!d){alert('セーブデータがありません');return;}
    P=d.P;floor=d.floor;Q=d.Q;chestCount=d.chestCount||0;bossesDefeated=d.bossesDefeated||0;
    guardNext=false;bossPhase2=false;inBattle=false;regenTurns=0;
    initCanvases();loadFloor(floor);show('map-sc');startBGM('explore');
    log(`📂 スロット${slot}ロード！`,'c');
  }catch(e){alert('読み込み失敗');}
}

function loadGame(){
  let found=false;for(let i=1;i<=3;i++){try{if(localStorage.getItem(`rpg3_save_${i}`)){found=true;break;}}catch(e){}}
  if(!found){alert('セーブデータが見つかりません');return;}
  if(!P){P={level:1};floor=0;}showSave();
}

function winGame(){
  stopBGM();sfxVic();
  $('win-stats').innerHTML=`Lv.${P.level} / 全${P.totalKills}体討伐 / ボス${P.bossKills||20}/20<br>所持金:${P.gold}G / クエスト:${Q.filter(q=>q.done).length}/${Q.length} / 歩数:${P.steps}`;
  show('win-sc');
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  const km={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  const d=km[e.key];if(d)move(d[0],d[1]);
});

// ===== TITLE ANIMATION =====
(function(){
  const c=document.getElementById('title-canvas');if(!c)return;
  const ctx=c.getContext('2d'),W=480,H=160;
  const stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,sp:Math.random()*.4+.1}));
  function frame(){
    ctx.fillStyle='#020208';ctx.fillRect(0,0,W,H);
    const t=Date.now()/1000;
    stars.forEach(s=>{const a=.35+Math.sin(t*s.sp*3+s.x)*.35;ctx.fillStyle=`rgba(232,213,163,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    // Castle
    ctx.fillStyle='#080818';
    const dT=(x,w,h)=>{ctx.fillRect(x,H-h,w,h);ctx.fillRect(x-4,H-h-11,6,11);ctx.fillRect(x+w-2,H-h-11,6,11);};
    dT(150,28,75);dT(302,28,75);ctx.fillRect(178,H-56,144,56);ctx.fillRect(166,H-68,156,14);
    ctx.fillStyle='#020208';ctx.beginPath();ctx.arc(250,H-56,17,Math.PI,0);ctx.fill();ctx.fillRect(233,H-56,34,36);
    // Moon
    ctx.fillStyle='#e8d5a3';ctx.globalAlpha=.88;ctx.beginPath();ctx.arc(W/2,38,26,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#080818';ctx.beginPath();ctx.arc(W/2+9,34,22,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    // Dragon
    const dx=45+Math.sin(t*.4)*35,dy=28+Math.sin(t*.7)*9;
    ctx.fillStyle='rgba(100,20,100,.7)';ctx.save();ctx.translate(dx,dy);
    ctx.beginPath();ctx.ellipse(0,0,11,5,t*.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,-3);ctx.lineTo(-16,-11);ctx.lineTo(-2,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,-3);ctx.lineTo(16,-11);ctx.lineTo(2,2);ctx.closePath();ctx.fill();
    ctx.restore();
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
