<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALM OF SHADOWS v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020208;display:flex;justify-content:center;padding:16px;min-height:100vh;font-family:'Georgia',serif}
#app{width:100%;max-width:720px;color:#e8d5a3}

/* TITLE */
#title-sc{text-align:center;padding:40px 16px;min-height:500px;display:flex;flex-direction:column;align-items:center;justify-content:center}
#title-canvas{border-radius:12px;margin-bottom:20px}
.title-h1{font-size:36px;color:#f5a623;letter-spacing:3px;text-shadow:0 0 30px #f5a62366;margin-bottom:8px}
.title-sub{color:#888;font-size:13px;margin-bottom:28px;letter-spacing:1px}
.big-btn{padding:14px 36px;background:#e94560;border:none;border-radius:10px;color:#fff;font-size:18px;cursor:pointer;font-family:Georgia,serif;letter-spacing:1px;transition:all .2s}
.big-btn:hover{background:#c0392b;transform:scale(1.04)}
.small-btn{padding:8px 20px;background:transparent;border:1px solid #444;border-radius:8px;color:#aaa;font-size:13px;cursor:pointer;font-family:Georgia,serif;margin-top:10px}
.small-btn:hover{border-color:#888;color:#e8d5a3}
#mute-btn{position:absolute;top:12px;right:12px;background:#111;border:1px solid #333;border-radius:6px;color:#aaa;padding:5px 10px;cursor:pointer;font-size:12px;z-index:10}
#mute-btn:hover{border-color:#888}

/* SCREENS */
.sc{display:none;padding:10px}
.sc.on{display:block}

/* HUD */
#hud{background:#0a0a1a;border:1px solid #1e1e3a;border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.hi{font-size:11px;color:#666}
.hi b{color:#e8d5a3;font-size:12px}
.bw{min-width:70px;flex:1}
.bar{height:7px;border-radius:4px;background:#111;overflow:hidden;margin-top:2px}
.bf{height:100%;border-radius:4px;transition:width .3s}
.hpb{background:#c0392b}
.mpb{background:#1a5276}
.xpb{background:#7d6608}

/* MAP CANVAS */
#map-wrap{position:relative;display:inline-block}
#map-canvas{display:block;border-radius:8px;border:1px solid #1e1e3a;image-rendering:pixelated}
#map-overlay{position:absolute;top:0;left:0;pointer-events:none;border-radius:8px}

/* LOG */
#log{background:#030310;border:1px solid #111;border-radius:6px;padding:6px 10px;height:68px;overflow-y:auto;font-size:11px;color:#888;margin:6px 0}
#log p{margin:1px 0;line-height:1.4}
#log .g{color:#27ae60}#log .r{color:#c0392b}#log .b{color:#8e44ad}#log .y{color:#e67e22}#log .c{color:#16a085}

/* CONTROLS */
.dpad{display:grid;grid-template-columns:repeat(3,38px);gap:3px}
.dpad button{width:38px;height:38px;background:#0a0a1a;border:1px solid #1e1e3a;border-radius:6px;color:#e8d5a3;font-size:14px;cursor:pointer;transition:background .1s}
.dpad button:hover{background:#0f3460}
.dpad button:active{transform:scale(.88);background:#e94560}
.ctrl-row{display:flex;gap:4px;margin-top:5px}
.ctrl-btn{padding:5px 10px;background:#0a0a1a;border:1px solid #1e1e3a;border-radius:6px;color:#aaa;cursor:pointer;font-size:11px;font-family:Georgia,serif}
.ctrl-btn:hover{border-color:#555;color:#e8d5a3}

/* BATTLE */
#battle-sc{text-align:center}
#b-hud{background:#0a0a1a;border:1px solid #1e1e3a;border-radius:10px;padding:8px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
#battle-canvas-wrap{position:relative;display:inline-block;margin:8px 0}
#battle-canvas{display:block;margin:0 auto;border-radius:10px;border:1px solid #1e1e3a}
#enm-name{font-size:17px;color:#e94560;margin:4px 0}
#phase-badge{font-size:11px;color:#9c27b0;min-height:16px}
#ehp-wrap{max-width:220px;margin:4px auto}
.btns{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btns button{padding:7px 13px;background:#0a0a1a;border:1px solid #2a2a4a;border-radius:6px;color:#e8d5a3;cursor:pointer;font-size:12px;font-family:Georgia,serif;transition:all .15s}
.btns button:hover{background:#0f3460;border-color:#e94560}
.btns button:disabled{opacity:.35;cursor:default}

/* SHOP / QUEST / STATS / SAVE */
.panel{background:#0a0a1a;border:1px solid #1e1e3a;border-radius:10px;padding:12px}
.panel h2{font-size:17px;margin-bottom:10px}
.shoprow{background:#060612;border:1px solid #1e1e3a;border-radius:7px;padding:7px 11px;margin:4px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px}
.shoprow button{padding:4px 10px;background:#7b1fa2;border:none;border-radius:5px;color:#fff;cursor:pointer;font-size:11px}
.shoprow button:hover{background:#6a1b9a}
.shoprow button:disabled{background:#222;cursor:default;color:#555}
.qrow{background:#060612;border:1px solid #1e1e3a;border-radius:7px;padding:7px 11px;margin:3px 0;font-size:12px}
.qrow.done{border-color:#27ae60;opacity:.7}
.iv-title{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.itm{display:inline-block;background:#060612;border:1px solid #2a2a4a;border-radius:4px;padding:2px 7px;margin:2px;font-size:11px;cursor:pointer}
.itm:hover{border-color:#f5a623}
.sk-btn{padding:5px 9px;background:#060612;border:1px solid #2a2a4a;border-radius:5px;color:#e8d5a3;cursor:pointer;font-size:11px;font-family:Georgia,serif;margin:2px}
.sk-btn:hover{background:#0f3460;border-color:#9c27b0}
.sk-btn:disabled{opacity:.3;cursor:default}
.save-row{background:#060612;border:1px solid #1e1e3a;border-radius:7px;padding:7px 11px;margin:4px 0;display:flex;align-items:center;justify-content:space-between;font-size:12px}
.save-row button{padding:4px 10px;background:#0f3460;border:1px solid #1e1e3a;border-radius:5px;color:#e8d5a3;cursor:pointer;font-size:11px}
.save-row button:hover{background:#163a60}
.ebtn{padding:9px 22px;background:#060612;border:1px solid #2a2a4a;border-radius:7px;color:#e8d5a3;font-size:14px;cursor:pointer;margin-top:12px;font-family:Georgia,serif}
.ebtn:hover{background:#0f3460}

/* END SCREENS */
#go-sc,#win-sc{text-align:center;padding:40px 16px}
#go-sc h2{color:#e94560;font-size:26px}
#win-sc h2{color:#f5a623;font-size:26px}

/* IVBOX */
.ivbox{background:#060612;border:1px solid #1e1e3a;border-radius:7px;padding:7px 9px;margin-top:5px}
</style>
</head>
<body>
<div id="app">
<button id="mute-btn" onclick="toggleMute()">🔊 音楽ON</button>

<!-- TITLE -->
<div id="title-sc" class="sc on">
  <canvas id="title-canvas" width="500" height="180"></canvas>
  <div class="title-h1">⚔ REALM OF SHADOWS ⚔</div>
  <div class="title-sub">剣と魔法の本格ファンタジーRPG — 音楽・強化グラフィック版</div>
  <button class="big-btn" onclick="startGame()">🗡 冒険を始める</button>
  <br>
  <button class="small-btn" onclick="loadGame()">💾 セーブデータを読む</button>
  <div style="margin-top:20px;color:#333;font-size:11px">矢印キー or D字ボタンで移動 | 音楽はブラウザ要件でクリック後に開始</div>
</div>

<!-- MAP -->
<div id="map-sc" class="sc">
  <div id="hud">
    <div class="hi">❤️<div class="bw"><div class="bar"><div class="bf hpb" id="hpb"></div></div></div></div>
    <div class="hi">💧<div class="bw"><div class="bar"><div class="bf mpb" id="mpb"></div></div></div></div>

    <div class="hi">🗺F<b id="fld">1</b></div>
  </div>

    <canvas id="map-canvas" width="504" height="504"></canvas>
    <canvas id="map-overlay" width="504" height="504"></canvas>

  <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
    <div>
      <div class="dpad">

        <button onclick="move(-1,0)">◀</button><div></div><button onclick="move(1,0)">▶</button>

    <div class="ivbox" style="flex:1;min-width:130px">
      <div class="iv-title">🎒 アイテム</div>

    </div>
    <div class="ivbox" style="flex:1;min-width:130px">

</div>

<!-- BATTLE -->
<div id="battle-sc" class="sc">
  <div id="b-hud">
    <div class="hi">❤️<div class="bw"><div class="bar"><div class="bf hpb" id="bhpb"></div></div></div></div>
    <div class="hi">💧<div class="bw"><div class="bar"><div class="bf mpb" id="bmpb"></div></div></div></div>
    <div class="hi">💰<b id="bgd">0</b>G</div>
    <div class="hi">⚔️<b id="batkd">10</b> 🛡<b id="bdefd">4</b></div>
  </div>

<!-- SHOP -->
<div id="shop-sc" class="sc">
  <div class="panel">
    <h2 style="color:#9c27b0">🏪 商店</h2>
    <div id="shop-g" style="color:#f5a623;margin-bottom:10px;font-size:13px"></div>
    <div id="shop-items"></div>
    <button class="ebtn" onclick="leaveShop()">店を出る</button>

</div>

<!-- NPC -->
<div id="npc-sc" class="sc">
  <div class="panel">
    <h2 style="color:#2196f3">💬 老賢者</h2>
    <div id="npc-text" style="font-size:13px;line-height:1.8;margin-bottom:12px;color:#ccc"></div>

</div>

<!-- QUEST -->
<div id="quest-sc" class="sc">

</div>

    <h2 style="color:#e8d5a3">📊 ステータス</h2>

  </div>
</div>

<!-- SAVE -->

    <h2 style="color:#00bcd4">💾 セーブ / ロード</h2>

  </div>
</div>

<!-- GAME OVER -->
<div id="go-sc" class="sc">
  <div style="font-size:56px;margin:20px 0">💀</div>

  <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">

</div>

  <div style="font-size:56px;margin:20px 0">🏆</div>

  <button class="ebtn" onclick="startGame()">ニューゲーム</button>
</div>

<script>
// ===== AUDIO ENGINE =====
let audioCtx=null, muted=true, bgmNodes=[], bgmInterval=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function playTone(freq,dur,type='square',vol=0.08,delay=0){
  if(muted||!audioCtx)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type;o.frequency.value=freq;
  const t=audioCtx.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.05);
}

function playChord(freqs,dur,vol=0.05){
  freqs.forEach(f=>playTone(f,dur,'sine',vol));
}

// BGM patterns
const BGM_EXPLORE=[
  [261,0.12],[0,0.12],[329,0.12],[0,0.12],[392,0.25],[0,0.12],
  [349,0.12],[0,0.12],[330,0.12],[0,0.12],[294,0.25],[0,0.25],
  [261,0.12],[0,0.12],[293,0.12],[0,0.12],[329,0.12],[0,0.12],[349,0.12],[0,0.12],
  [392,0.25],[0,0.25],
];
const BGM_BATTLE=[
  [220,0.1],[0,0.05],[277,0.1],[0,0.05],[330,0.1],[0,0.05],[440,0.15],[0,0.1],
  [415,0.1],[0,0.05],[370,0.1],[0,0.05],[330,0.1],[0,0.05],[294,0.2],[0,0.1],
  [261,0.1],[0,0.05],[311,0.1],[0,0.05],[370,0.1],[0,0.05],[466,0.2],[0,0.1],
];
const BGM_BOSS=[
  [110,0.15],[0,0.05],[138,0.1],[0,0.05],[165,0.1],[0,0.05],[220,0.2],[0,0.05],
  [207,0.1],[0,0.05],[185,0.1],[0,0.05],[165,0.15],[0,0.1],
  [110,0.1],[0,0.05],[123,0.1],[0,0.05],[146,0.1],[0,0.05],[185,0.2],[0,0.1],
];

let bgmIdx=0, bgmPattern=null, bgmTimer=null;
function startBGM(pattern){
  stopBGM();
  if(muted||!audioCtx)return;
  bgmPattern=pattern;bgmIdx=0;
  function step(){
    if(!bgmPattern||muted){bgmTimer=null;return;}
    const [f,d]=bgmPattern[bgmIdx%bgmPattern.length];
    if(f>0)playTone(f,d,'square',0.04);
    bgmIdx++;
    bgmTimer=setTimeout(step,d*1000);
  }
  step();
}
function stopBGM(){if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}bgmPattern=null;}

function sfxAttack(){playTone(440,0.06,'sawtooth',0.1);playTone(330,0.08,'sawtooth',0.08,0.06);}
function sfxMagic(){[523,659,784,1047].forEach((f,i)=>playTone(f,0.12,'sine',0.08,i*0.06));}
function sfxHurt(){playTone(220,0.15,'sawtooth',0.12);playTone(185,0.1,'sawtooth',0.1,0.1);}
function sfxLevelUp(){[261,329,392,523,659,784].forEach((f,i)=>playTone(f,0.15,'square',0.1,i*0.08));}
function sfxChest(){[523,659,784].forEach((f,i)=>playTone(f,0.1,'sine',0.08,i*0.07));}
function sfxStep(){playTone(180,0.03,'square',0.02);}
function sfxVictory(){
  const mel=[523,523,523,415,523,0,659,0,523];
  mel.forEach((f,i)=>{if(f)playTone(f,0.2,'square',0.08,i*0.18);});
}
function sfxGameOver(){[440,415,370,330,294,261].forEach((f,i)=>playTone(f,0.25,'sawtooth',0.09,i*0.2));}

function toggleMute(){
  initAudio();
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇 音楽OFF':'🔊 音楽ON';
  if(!muted){
    const sc=document.querySelector('.sc.on').id;
    if(sc==='battle-sc')startBGM(curEnemy&&curEnemy.isBoss?BGM_BOSS:BGM_BATTLE);
    else if(sc==='map-sc')startBGM(BGM_EXPLORE);
  } else stopBGM();
}

// ===== GRAPHICS =====
const TILE=36;
const COLORS={
  wall:'#0d0d20',wallBorder:'#1a1a35',
  floor:'#0f0f25',floorLine:'#151530',
  player:'#e8d5a3',playerBg:'#0f3460',
  enemy:'#ff6b6b',boss:'#c678dd',
  chest:'#f5a623',exit:'#4caf50',
  shop:'#9c27b0',npc:'#2196f3',save:'#00bcd4',
  fog:'#020208',
};

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}

let mapCanvas,mapCtx,overlayCanvas,overlayCtx;
let particles=[];
let animFrame=null;

function initMapCanvas(){
  mapCanvas=document.getElementById('map-canvas');
  mapCtx=mapCanvas.getContext('2d');
  overlayCanvas=document.getElementById('map-overlay');
  overlayCtx=overlayCanvas.getContext('2d');
  const sz=MAPS[0].length*TILE;
  mapCanvas.width=sz;mapCanvas.height=sz;
  overlayCanvas.width=sz;overlayCanvas.height=sz;
  if(animFrame)cancelAnimationFrame(animFrame);
  animLoop();
}

function animLoop(){
  animFrame=requestAnimationFrame(animLoop);
  drawOverlay();
}

let walkAnim=0;
function drawMap(){
  if(!mapCtx||!mapData)return;
  const ctx=mapCtx;
  const W=mapData[0].length,H=mapData.length;
  ctx.clearRect(0,0,W*TILE,H*TILE);
  mapData.forEach((row,y)=>row.forEach((cell,x)=>{
    const px=x*TILE,py=y*TILE;
    if(!cell.vis){
      // revealed but dark
      if(cell.seen){
        ctx.fillStyle='#060612';ctx.fillRect(px,py,TILE,TILE);
      }
      return;
    }
    if(cell.type==='wall'){
      // wall with subtle texture
      ctx.fillStyle=COLORS.wall;ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle=COLORS.wallBorder;ctx.lineWidth=0.5;
      ctx.strokeRect(px+1,py+1,TILE-2,TILE-2);
      // top highlight
      ctx.fillStyle='#1e1e40';ctx.fillRect(px,py,TILE,3);
    } else {
      // floor
      ctx.fillStyle=COLORS.floor;ctx.fillRect(px,py,TILE,TILE);
      // subtle grid lines
      ctx.strokeStyle=COLORS.floorLine;ctx.lineWidth=0.3;
      ctx.strokeRect(px,py,TILE,TILE);
      // object
      const obj=cell.obj;
      if(obj==='player') drawPlayer(ctx,px,py);
      else if(obj==='enemy') drawEnemy(ctx,px,py,false);
      else if(obj==='boss') drawEnemy(ctx,px,py,true);
      else if(obj==='chest') drawChest(ctx,px,py);
      else if(obj==='exit') drawExit(ctx,px,py);
      else if(obj==='shop') drawShop(ctx,px,py);
      else if(obj==='npc') drawNPC(ctx,px,py);
      else if(obj==='save') drawSave(ctx,px,py);
    }
  }));
}

function drawPlayer(ctx,px,py){
  const t=Date.now()/400;
  // body
  ctx.fillStyle='#0f3460';ctx.fillRect(px+6,py+8,TILE-12,TILE-10);
  // cloak
  ctx.fillStyle='#1a1a4a';ctx.fillRect(px+4,py+12,TILE-8,TILE-14);
  // head
  ctx.fillStyle='#e8d5a3';ctx.beginPath();ctx.arc(px+TILE/2,py+10,7,0,Math.PI*2);ctx.fill();
  // helmet
  ctx.fillStyle='#888';ctx.fillRect(px+TILE/2-7,py+4,14,6);
  ctx.fillStyle='#aaa';ctx.fillRect(px+TILE/2-5,py+3,10,3);
  // sword
  ctx.strokeStyle='#ddd';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(px+TILE-6,py+10+Math.sin(t)*2);ctx.lineTo(px+TILE-6,py+28+Math.sin(t)*2);ctx.stroke();
  // aura
  ctx.strokeStyle=`rgba(233,69,96,${0.3+Math.sin(t*2)*0.15})`;ctx.lineWidth=2;

function drawEnemy(ctx,px,py,isBoss){

    const bob=Math.sin(t)*2;

    // wings
    ctx.fillStyle='#5a1a5a';
    ctx.beginPath();ctx.moveTo(px+4,py+10+bob);ctx.lineTo(px-2,py+4+bob);ctx.lineTo(px+8,py+14+bob);ctx.fill();
    ctx.beginPath();ctx.moveTo(px+TILE-4,py+10+bob);ctx.lineTo(px+TILE+2,py+4+bob);ctx.lineTo(px+TILE-8,py+14+bob);ctx.fill();
    // head
    ctx.fillStyle='#7a1a7a';ctx.beginPath();ctx.arc(px+TILE/2,py+9+bob,8,0,Math.PI*2);ctx.fill();
    // eyes
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(px+TILE/2-3,py+8+bob,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+TILE/2+3,py+8+bob,2,0,Math.PI*2);ctx.fill();

    ctx.strokeStyle=`rgba(198,120,221,${0.4+Math.sin(t*2)*0.2})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2,TILE/2-1,0,Math.PI*2);ctx.stroke();

function drawOverlay(){
  if(!overlayCtx||!mapData)return;
  const ctx=overlayCtx;
  const W=mapData[0].length,H=mapData.length;
  ctx.clearRect(0,0,W*TILE,H*TILE);
  // FOG
  mapData.forEach((row,y)=>row.forEach((cell,x)=>{
    if(!cell.vis){
      ctx.fillStyle=cell.seen?'rgba(2,2,8,0.72)':'rgba(2,2,8,0.97)';
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }));
  // PARTICLES
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vy+=0.05;
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
    ctx.globalAlpha=1;
  });
  // Redraw map on top of fog
  drawMap();
}

function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    particles.push({
      x:x*TILE+TILE/2,y:y*TILE+TILE/2,
      vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-1,
      life:1,decay:0.04+Math.random()*0.04,
      color,r:2+Math.random()*3
    });
  }
}

let battleCanvas,battleCtx;
let curEnemy=null;
let enemyShake=0,playerAttackAnim=0,magicAnim=0;
let battleAnimFrame=null;

function initBattleCanvas(){
  battleCanvas=document.getElementById('battle-canvas');
  battleCtx=battleCanvas.getContext('2d');
  if(battleAnimFrame)cancelAnimationFrame(battleAnimFrame);
  battleAnimLoop();
}

function battleAnimLoop(){
  battleAnimFrame=requestAnimationFrame(battleAnimLoop);
  drawBattle();
}

function drawBattle(){
  if(!battleCtx||!curEnemy)return;
  const ctx=battleCtx;
  const W=500,H=280;
  ctx.clearRect(0,0,W,H);
  const t=Date.now()/1000;

  // Background - dungeon scene
  ctx.fillStyle='#060612';ctx.fillRect(0,0,W,H);
  // floor
  ctx.fillStyle='#0d0d20';ctx.fillRect(0,H-60,W,60);
  // floor tiles
  for(let i=0;i<W;i+=40){
    ctx.strokeStyle='#111130';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(i,H-60);ctx.lineTo(i,H);ctx.stroke();
  }
  ctx.strokeStyle='#111130';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(0,H-30);ctx.lineTo(W,H-30);ctx.stroke();
  // wall torches
  drawTorch(ctx,60,H-100,t);
  drawTorch(ctx,W-60,H-100,t);
  // pillars
  ctx.fillStyle='#0a0a1e';ctx.fillRect(30,H-140,24,80);
  ctx.fillStyle='#0a0a1e';ctx.fillRect(W-54,H-140,24,80);
  ctx.strokeStyle='#1a1a3a';ctx.lineWidth=1;
  ctx.strokeRect(30,H-140,24,80);ctx.strokeRect(W-54,H-140,24,80);

  // Enemy
  const ex=300,ey=H-80;
  const shake=enemyShake>0?(Math.random()-0.5)*enemyShake*6:0;
  const bob=Math.sin(t*1.5)*4;
  drawBattleEnemy(ctx,ex+shake,ey+bob,curEnemy,t);
  if(enemyShake>0)enemyShake-=0.1;

  // Player
  const pa=playerAttackAnim;
  const px2=120+(pa>0?pa*60:0);
  drawBattlePlayer(ctx,px2,H-70,t,pa>0);
  if(playerAttackAnim>0)playerAttackAnim=Math.max(0,playerAttackAnim-0.08);

  // Magic effect
  if(magicAnim>0){
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2+t*5;
      const r=40+magicAnim*30;
      const mx=ex+Math.cos(a)*r,my=ey-30+Math.sin(a)*r*0.5;
      ctx.fillStyle=`rgba(142,68,173,${magicAnim*0.8})`;
      ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle=`rgba(142,68,173,${magicAnim*0.5})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(ex,ey-30,40+magicAnim*30,0,Math.PI*2);ctx.stroke();
    magicAnim=Math.max(0,magicAnim-0.04);
  }
}

function drawTorch(ctx,x,y,t){
  ctx.fillStyle='#3d1f00';ctx.fillRect(x-3,y,6,16);
  const flicker=Math.sin(t*8+x)*0.3;
  const grad=ctx.createRadialGradient(x,y,0,x,y,20);
  grad.addColorStop(0,`rgba(255,180,0,${0.8+flicker})`);
  grad.addColorStop(0.4,`rgba(255,100,0,${0.4+flicker*0.5})`);
  grad.addColorStop(1,'rgba(255,50,0,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,200,50,${0.9+flicker})`;
  ctx.beginPath();ctx.moveTo(x,y-12);ctx.lineTo(x-5,y);ctx.lineTo(x+5,y);ctx.closePath();ctx.fill();
}

function drawBattleEnemy(ctx,x,y,en,t){
  const isBoss=en.isBoss;
  const scale=isBoss?2.2:1.5;
  const s=scale*18;
  if(isBoss){
    // Dragon
    const hp=en.hp/en.maxhp;
    const rage=hp<0.5;
    ctx.save();ctx.translate(x,y);
    // wings
    ctx.fillStyle=rage?'#4a0a4a':'#2a0a3a';
    ctx.beginPath();ctx.moveTo(0,-s*0.5);ctx.lineTo(-s*1.4,-s*1.2);ctx.lineTo(-s*0.3,-s*0.2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-s*0.5);ctx.lineTo(s*1.4,-s*1.2);ctx.lineTo(s*0.3,-s*0.2);ctx.closePath();ctx.fill();
    // body
    ctx.fillStyle=rage?'#5a1a6a':'#3a0a4a';
    ctx.beginPath();ctx.ellipse(0,0,s*0.7,s,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.fillStyle=rage?'#7a1a7a':'#5a0a6a';
    ctx.beginPath();ctx.arc(0,-s*1.1,s*0.65,0,Math.PI*2);ctx.fill();
    // eyes
    const eyeCol=rage?'#ff4400':'#ffcc00';
    ctx.fillStyle=eyeCol;
    ctx.beginPath();ctx.arc(-s*0.25,-s*1.1,s*0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(s*0.25,-s*1.1,s*0.15,0,Math.PI*2);ctx.fill();
    // aura glow
    const auraAlpha=0.15+Math.sin(t*3)*0.08;
    ctx.strokeStyle=rage?`rgba(255,0,100,${auraAlpha*2})`:`rgba(180,80,220,${auraAlpha})`;
    ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,-s*0.4,s*1.3,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  } else {
    ctx.save();ctx.translate(x,y);
    // body
    ctx.fillStyle='#551111';ctx.beginPath();ctx.ellipse(0,0,s*0.5,s*0.75,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.fillStyle='#771111';ctx.beginPath();ctx.arc(0,-s*0.85,s*0.5,0,Math.PI*2);ctx.fill();
    // eyes
    ctx.fillStyle='#ff4444';
    ctx.beginPath();ctx.arc(-s*0.18,-s*0.85,s*0.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(s*0.18,-s*0.85,s*0.1,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawBattlePlayer(ctx,x,y,t,attacking){
  ctx.save();ctx.translate(x,y);
  // cloak
  ctx.fillStyle='#1a1a4a';ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(12,0);ctx.lineTo(10,30);ctx.lineTo(-10,30);ctx.closePath();ctx.fill();
  // body
  ctx.fillStyle='#0f3460';ctx.fillRect(-10,-10,20,25);
  // head
  ctx.fillStyle='#e8d5a3';ctx.beginPath();ctx.arc(0,-18,10,0,Math.PI*2);ctx.fill();
  // helmet
  ctx.fillStyle='#888';ctx.fillRect(-10,-26,20,10);ctx.fillStyle='#aaa';ctx.fillRect(-8,-28,16,5);
  // sword
  const sway=attacking?20:Math.sin(t)*3;
  ctx.strokeStyle='#ddd';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(14,-10+sway*0.3);ctx.lineTo(14+sway,18);ctx.stroke();
  // guard
  ctx.strokeStyle='#aaa';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(8,4+sway*0.1);ctx.lineTo(20,4+sway*0.1);ctx.stroke();
  ctx.restore();
}

  const p=document.createElement('p');if(cls)p.className=cls;
  p.textContent=msg;l.appendChild(p);l.scrollTop=l.scrollHeight;
  while(l.children.length>20)l.removeChild(l.firstChild);
}

function startGame(){
  initAudio();
  floor=0;chestCount=0;bossesDefeated=0;guardNext=false;bossPhase2=false;inBattle=false;
  P={x:1,y:1,hp:100,maxHp:100,mp:40,maxMp:40,atk:10,def:4,xp:0,xpNext:60,level:1,gold:30,
     inventory:['薬草','薬草','MP回復薬'],skills:['slash','heal'],kills:{},totalKills:0,steps:0};
  Q=JSON.parse(JSON.stringify(QUESTS));
  initMapCanvas();
  loadFloor(0);
  show('map-sc');
  startBGM(BGM_EXPLORE);
  log('⚔️ 闇の王国への冒険が始まった！','c');
}

function loadFloor(f){
  floor=f;
  const base=JSON.parse(JSON.stringify(MAPS[f]));
  mapData=base.map(row=>row.map(v=>({type:v===1?'wall':'floor',obj:null,vis:false,seen:false})));
  const ec=[4,6,8][f],cc=[3,4,5][f];
  placeRand(ec,'enemy');placeRand(cc,'chest');
  mapData[12][12].obj='boss';
  if(f<MAPS.length-1)mapData[12][1].obj='exit';
  mapData[1][12].obj='shop';
  mapData[6][1].obj='npc';
  if(f>0)mapData[1][6].obj='save';
  mapData[P.y][P.x].obj='player';
  updateFOV();drawMap();updateHUD();
}

function placeRand(n,type){
  let placed=0,tries=0;
  while(placed<n&&tries<300){
    tries++;const x=1+Math.floor(Math.random()*12),y=1+Math.floor(Math.random()*12);
    const c=mapData[y]?.[x];
    if(c&&c.type==='floor'&&!c.obj&&!(x===P.x&&y===P.y)){c.obj=type;placed++;}
  }
}

function updateFOV(){
  const R=4;
  for(let y=0;y<mapData.length;y++)for(let x=0;x<mapData[0].length;x++)mapData[y][x].vis=false;
  for(let dy=-R;dy<=R;dy++)for(let dx=-R;dx<=R;dx++){
    if(dx*dx+dy*dy>R*R)continue;
    const nx=P.x+dx,ny=P.y+dy;
    if(mapData[ny]?.[nx]){mapData[ny][nx].vis=true;mapData[ny][nx].seen=true;}
  }
}

function updateHUD(){
  $('hpb').style.width=(P.hp/P.maxHp*100)+'%';
  $('mpb').style.width=(P.mp/P.maxMp*100)+'%';
  $('xpb').style.width=(P.xp/P.xpNext*100)+'%';
  $('lvd').textContent=P.level;$('gd').textContent=P.gold;
  $('atkd').textContent=P.atk;$('defd').textContent=P.def;$('fld').textContent=floor+1;
  renderInv();renderSkills();checkQuests();
}

function renderInv(){
  const inv=$('ivl');if(!inv)return;
  if(!P.inventory.length){inv.innerHTML='<span style="color:#333;font-size:11px">なし</span>';return;}
  const cnt={};P.inventory.forEach(i=>cnt[i]=(cnt[i]||0)+1);
  inv.innerHTML=Object.entries(cnt).map(([n,c])=>`<span class="itm" onclick="useItemMap('${n}')">${n}×${c}</span>`).join('');
}

function renderSkills(){
  const sk=$('skl');if(!sk)return;
  sk.innerHTML=P.skills.map(id=>{
    const s=SKILLS.find(s=>s.id===id);
    return s?`<button class="sk-btn" title="${s.desc}">${s.icon}${s.name}(${s.mpCost})</button>`:'';
  }).join('');
}

function useItemMap(name){
  const idx=P.inventory.indexOf(name);if(idx===-1)return;
  P.inventory.splice(idx,1);
  if(name==='MP回復薬'||name==='ハイMP薬'){const v=name==='ハイMP薬'?60:30;P.mp=Math.min(P.maxMp,P.mp+v);log(`💧 ${name}でMP+${v}！`,'g');}
  else{const v={薬草:30,大回復薬:80,エリクサー:150}[name]||30;P.hp=Math.min(P.maxHp,P.hp+v);log(`🧪 ${name}でHP+${v}！`,'g');}
  updateHUD();
}

function move(dx,dy){
  if(inBattle)return;
  const nx=P.x+dx,ny=P.y+dy;
  const cell=mapData[ny]?.[nx];
  if(!cell||cell.type==='wall')return;
  const obj=cell.obj;
  if(obj==='enemy'){startBattle(nx,ny,false);return;}
  if(obj==='boss'){startBattle(nx,ny,true);return;}
  if(obj==='chest'){openChest(nx,ny);}
  if(obj==='exit'){nextFloor();return;}
  if(obj==='shop'){enterShop();return;}
  if(obj==='npc'){enterNPC();return;}
  if(obj==='save'){showSave();return;}
  mapData[P.y][P.x].obj=null;
  P.x=nx;P.y=ny;P.steps++;
  mapData[ny][nx].obj='player';
  sfxStep();updateFOV();drawMap();
}

function openChest(x,y){
  chestCount++;
  mapData[y][x].obj=null;
  spawnParticles(x,y,'#f5a623',12);
  sfxChest();
  const r=Math.random();
  if(r<0.25){P.inventory.push('薬草');log('📦 薬草を入手！','g');}
  else if(r<0.4){P.inventory.push('大回復薬');log('📦 大回復薬を入手！','g');}
  else if(r<0.5){P.inventory.push('MP回復薬');log('📦 MP回復薬を入手！','g');}
  else if(r<0.6){const sc=SKILLS.find(s=>!P.skills.includes(s.id));if(sc){P.skills.push(sc.id);log(`📦 スキル「${sc.name}」習得！`,'b');}else{const g=20+Math.floor(Math.random()*30*(floor+1));P.gold+=g;log(`📦 ${g}Gを入手！`,'y');}}
  else{const g=15+Math.floor(Math.random()*25*(floor+1));P.gold+=g;log(`📦 ${g}Gを入手！`,'y');}
  updateHUD();
}

function nextFloor(){
  if(floor>=MAPS.length-1){winGame();return;}
  floor++;P.x=1;P.y=1;
  log(`🚪 ${floor+1}階へ進んだ！`,'c');
  loadFloor(floor);show('map-sc');
}

function enterShop(){show('shop-sc');renderShop();}
function enterNPC(){$('npc-text').textContent=NPCS[floor]||NPCS[0];show('npc-sc');}
function leaveNPC(){show('map-sc');}
function leaveShop(){show('map-sc');updateHUD();}

function renderShop(){
  $('shop-g').textContent=`所持金：${P.gold}G`;
  $('shop-items').innerHTML=SHOP_ITEMS.map((it,i)=>
    `<div class="shoprow"><span>${it.icon} <b>${it.name}</b> ${it.desc}</span><button ${P.gold<it.cost?'disabled':''} onclick="buyItem(${i})">${it.cost}G</button></div>`
  ).join('');
}

function buyItem(i){
  const it=SHOP_ITEMS[i];if(P.gold<it.cost)return;
  P.gold-=it.cost;
  if(it.type==='heal'||it.type==='mpHeal')P.inventory.push(it.name);
  else if(it.type==='atk'){P.atk+=it.val;log(`⚔️ ATK+${it.val}！`,'g');}
  else if(it.type==='def'){P.def+=it.val;log(`🛡 DEF+${it.val}！`,'g');}
  else if(it.type==='maxMp'){P.maxMp+=it.val;P.mp=Math.min(P.maxMp,P.mp+it.val);log(`🔮 最大MP+${it.val}！`,'b');}
  renderShop();
}

function startBattle(ex,ey,isBoss){
  inBattle=true;guardNext=false;bossPhase2=false;battleLocked=false;
  const pool=isBoss?null:ENEMIES.slice(0,3+floor*2);
  curEnemy=JSON.parse(JSON.stringify(isBoss?BOSSES[floor]:pool[Math.floor(Math.random()*pool.length)]));
  curEnemy.ex=ex;curEnemy.ey=ey;
  $('enm-name').textContent=curEnemy.name+(isBoss?' 【ボス】':'');
  $('phase-badge').textContent='';
  updateBHUD();
  initBattleCanvas();
  show('battle-sc');
  stopBGM();
  startBGM(isBoss?BGM_BOSS:BGM_BATTLE);
  log(`${isBoss?'🔥':'⚔️'} ${curEnemy.name}が現れた！`,'r');
  $('skill-btns').style.display='none';$('battle-btns').style.display='flex';
}

function updateBHUD(){
  $('bhpb').style.width=(P.hp/P.maxHp*100)+'%';
  $('bmpb').style.width=(P.mp/P.maxMp*100)+'%';
  $('bgd').textContent=P.gold;
  $('batkd').textContent=P.atk;$('bdefd').textContent=P.def;
  $('ehpt').textContent=`${Math.max(0,curEnemy.hp)}/${curEnemy.maxhp}`;
  $('ehpb').style.width=(Math.max(0,curEnemy.hp)/curEnemy.maxhp*100)+'%';
}

function ba(act){
  if(battleLocked)return;
  if(act==='skill'){
    $('battle-btns').style.display='none';
    const sb=$('skill-btns');sb.style.display='flex';
    sb.innerHTML=P.skills.map(id=>{const s=SKILLS.find(s=>s.id===id);return s?`<button onclick="useSkill('${id}')" ${P.mp<s.mpCost?'disabled':''}>${s.icon}${s.name}(${s.mpCost}MP)</button>`:''}).join('')+'<button onclick="cancelSkill()">キャンセル</button>';
    return;
  }
  if(act==='attack'){
    const dmg=Math.max(1,P.atk-curEnemy.def+Math.floor(Math.random()*6));
    curEnemy.hp-=dmg;playerAttackAnim=1;sfxAttack();
    log(`⚔️ ${dmg}ダメージ！`,'g');
  } else if(act==='magic'){
    if(P.mp<10){log('💧 MPが足りない！','r');return;}
    P.mp-=10;const dmg=Math.floor(P.atk*2+Math.random()*8);
    curEnemy.hp-=dmg;magicAnim=1;sfxMagic();
    log(`✨ 魔法で${dmg}ダメージ！`,'b');
  } else if(act==='item'){
    const idx=P.inventory.indexOf('薬草');
    const idx2=P.inventory.indexOf('大回復薬');
    if(idx===-1&&idx2===-1){log('🧪 回復アイテムがない！','r');return;}
    if(idx2!==-1){P.inventory.splice(idx2,1);P.hp=Math.min(P.maxHp,P.hp+80);log('⚗️ 大回復薬HP+80！','g');}
    else{P.inventory.splice(idx,1);P.hp=Math.min(P.maxHp,P.hp+30);log('🧪 薬草HP+30！','g');}
  } else if(act==='run'){
    if(curEnemy.isBoss){log('🚫 ボスからは逃げられない！','r');return;}
    if(Math.random()<0.45){log('🏃 逃走成功！','c');endBattle(false);return;}
    else log('逃げられなかった！','r');
  }
  if(curEnemy.hp<=0){battleLocked=true;enemyShake=3;setTimeout(()=>battleWin(),600);return;}
  checkPhase2();enemyTurn();updateBHUD();
}

function useSkill(id){
  const s=SKILLS.find(s=>s.id===id);if(!s||P.mp<s.mpCost)return;
  P.mp-=s.mpCost;
  $('skill-btns').style.display='none';$('battle-btns').style.display='flex';
  if(s.guard){guardNext=true;log(`🛡 鉄壁発動！`,'b');}
  else if(s.heal){const h=Math.floor(P.maxHp*s.heal);P.hp=Math.min(P.maxHp,P.hp+h);log(`💚 HP+${h}！`,'g');}
  else{
    const dmg=Math.floor(P.atk*s.dmgMul+Math.random()*10);
    curEnemy.hp-=dmg;magicAnim=1.5;sfxMagic();
    log(`${s.icon} ${s.name}で${dmg}の大ダメージ！`,'b');
    if(s.stun&&Math.random()<0.4){log('⚡ 麻痺！（1ターン休み）','c');updateBHUD();if(curEnemy.hp<=0){battleLocked=true;setTimeout(()=>battleWin(),600);}return;}
  }
  if(curEnemy.hp<=0){battleLocked=true;enemyShake=3;setTimeout(()=>battleWin(),600);return;}
  checkPhase2();enemyTurn();updateBHUD();
}

function checkPhase2(){
  if(curEnemy.isBoss&&!bossPhase2&&curEnemy.hp<=curEnemy.maxhp/2){
    bossPhase2=true;curEnemy.atk=curEnemy.phase2atk;
    $('enm-name').textContent=curEnemy.phase2name;
    $('phase-badge').textContent='⚡ フェーズ2突入！';
    log(`💥 ${curEnemy.phase2name}！`,'r');
  }
}

function cancelSkill(){$('skill-btns').style.display='none';$('battle-btns').style.display='flex';}

function enemyTurn(){
  let edm=Math.max(1,curEnemy.atk-P.def+Math.floor(Math.random()*5));
  if(guardNext){edm=Math.max(1,Math.floor(edm*0.3));guardNext=false;log(`🛡 鉄壁で${edm}に軽減！`,'g');}
  else{sfxHurt();log(`👾 ${curEnemy.name}の攻撃！${edm}ダメージ！`,'r');}
  P.hp-=edm;
  if(P.hp<=0){setTimeout(()=>{sfxGameOver();show('go-sc');stopBGM();},600);}
}

function battleWin(){
  sfxVictory();
  P.gold+=curEnemy.gold;P.xp+=curEnemy.xp;
  P.kills[curEnemy.name]=(P.kills[curEnemy.name]||0)+1;P.totalKills++;
  log(`🏆 勝利！${curEnemy.xp}XP・${curEnemy.gold}G！`,'y');
  if(curEnemy.isBoss)bossesDefeated++;
  while(P.xp>=P.xpNext)levelUp();
  mapData[curEnemy.ey][curEnemy.ex].obj=null;
  endBattle(true);checkQuestProgress();
}

function levelUp(){
  P.xp-=P.xpNext;P.level++;P.xpNext=Math.floor(P.xpNext*1.6);
  P.maxHp+=18;P.hp=P.maxHp;P.maxMp+=10;P.mp=P.maxMp;P.atk+=4;P.def+=2;
  sfxLevelUp();
  if(P.level%3===0){const sc=SKILLS.find(s=>!P.skills.includes(s.id));if(sc){P.skills.push(sc.id);log(`⭐ Lv.${P.level}！スキル「${sc.name}」習得！`,'b');}else log(`⭐ Lv.${P.level}！`,'b');}
  else log(`⭐ レベルアップ！Lv.${P.level}！`,'b');
}

function endBattle(won){
  inBattle=false;guardNext=false;
  if(won){mapData[P.y][P.x].obj=null;P.x=curEnemy.ex;P.y=curEnemy.ey;mapData[P.y][P.x].obj='player';}
  stopBGM();startBGM(BGM_EXPLORE);
  show('map-sc');updateFOV();drawMap();updateHUD();
}

function checkQuestProgress(){
  Q.forEach(q=>{
    if(q.done)return;
    if(q.type==='kill'&&(P.kills[q.target]||0)>=q.need)completeQuest(q);
    if(q.type==='chest'&&chestCount>=q.need)completeQuest(q);
    if(q.type==='boss'&&curEnemy&&curEnemy.isBoss&&floor===q.bossFloor)completeQuest(q);
    if(q.type==='bossAll'&&bossesDefeated>=q.need)completeQuest(q);
  });
}
function checkQuests(){Q.forEach(q=>{if(!q.done&&q.type==='gold'&&P.gold>=q.need)completeQuest(q);});}
function completeQuest(q){
  q.done=true;log(`📋 クエスト完了：${q.name}！`,'y');
  if(q.reward.gold){P.gold+=q.reward.gold;log(`💰 報酬：${q.reward.gold}G！`,'y');}
  if(q.reward.item){P.inventory.push(q.reward.item);log(`🎁 ${q.reward.item}を入手！`,'g');}
  updateHUD();
}

function showQuests(){
  $('qlist').innerHTML=Q.map(q=>{
    let prog='';
    if(!q.done){
      if(q.type==='kill')prog=`(${P.kills[q.target]||0}/${q.need})`;
      else if(q.type==='chest')prog=`(${chestCount}/${q.need})`;
      else if(q.type==='gold')prog=`(${P.gold}/${q.need}G)`;
      else if(q.type==='boss'||q.type==='bossAll')prog=`(${bossesDefeated}/${q.need})`;
    }
    const rw=[];if(q.reward.gold)rw.push(q.reward.gold+'G');if(q.reward.item)rw.push(q.reward.item);
    return `<div class="qrow ${q.done?'done':''}">
      <b>${q.done?'✅':'🔲'} ${q.name}</b>
      <div style="color:#666;font-size:11px;margin-top:2px">${q.desc} ${prog}</div>
      ${q.done?'':'<div style="color:#f5a623;font-size:11px">報酬: '+rw.join('・')+'</div>'}
    </div>`;
  }).join('');
  show('quest-sc');
}

function showStats(){
  const cnt={};P.inventory.forEach(i=>cnt[i]=(cnt[i]||0)+1);
  $('stats-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px;margin-bottom:10px">
      <div>❤️ HP: <b>${P.hp}/${P.maxHp}</b></div>
      <div>💧 MP: <b>${P.mp}/${P.maxMp}</b></div>
      <div>⚔️ ATK: <b>${P.atk}</b></div>
      <div>🛡 DEF: <b>${P.def}</b></div>
      <div>⭐ Lv: <b>${P.level}</b></div>
      <div>💰 Gold: <b>${P.gold}</b></div>
      <div>💀 討伐: <b>${P.totalKills}</b></div>
      <div>👣 歩数: <b>${P.steps}</b></div>
    </div>
    <div class="iv-title">スキル</div>
    <div style="margin-bottom:8px">${P.skills.map(id=>{const s=SKILLS.find(s=>s.id===id);return s?`<span class="itm">${s.icon}${s.name}</span>`:''}).join('')}</div>
    <div class="iv-title">アイテム</div>
    <div>${Object.entries(cnt).map(([n,c])=>`<span class="itm">${n}×${c}</span>`).join('')||'<span style="color:#333">なし</span>'}</div>`;
  show('stats-sc');
}

function showSave(){
  const s=$('save-slots');
  s.innerHTML='<div class="iv-title" style="margin-bottom:8px">セーブスロット（ブラウザに保存）</div>';
  for(let i=1;i<=3;i++){
    let info='空きスロット';
    try{const d=JSON.parse(localStorage.getItem(`rpg_save_${i}`));if(d)info=`Lv.${d.P.level} F${d.floor+1} ${d.ts}`;}catch(e){}
    const div=document.createElement('div');div.className='save-row';
    div.innerHTML=`<span>スロット${i}: <span style="color:#777">${info}</span></span>
      <div style="display:flex;gap:5px">
        <button onclick="saveGame(${i})">💾 保存</button>
        <button onclick="loadSlot(${i})">📂 読込</button>
      </div>`;
    s.appendChild(div);
  }
  if(!inBattle)show('save-sc');
}

function saveGame(slot){
  if(!P){alert('ゲームを開始してからセーブしてください');return;}
  const ts=new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  try{localStorage.setItem(`rpg_save_${slot}`,JSON.stringify({P,floor,Q,chestCount,bossesDefeated,ts}));log(`💾 スロット${slot}にセーブ！`,'c');showSave();}
  catch(e){log('⚠️ セーブ失敗','r');}
}

function loadSlot(slot){
  try{
    const d=JSON.parse(localStorage.getItem(`rpg_save_${slot}`));
    if(!d){alert('セーブデータがありません');return;}
    P=d.P;floor=d.floor;Q=d.Q;chestCount=d.chestCount||0;bossesDefeated=d.bossesDefeated||0;
    guardNext=false;bossPhase2=false;inBattle=false;
    initMapCanvas();loadFloor(floor);show('map-sc');
    startBGM(BGM_EXPLORE);
    log(`📂 スロット${slot}からロード！`,'c');
  }catch(e){alert('読み込み失敗');}
}

function loadGame(){
  let found=false;
  for(let i=1;i<=3;i++){try{if(localStorage.getItem(`rpg_save_${i}`)){found=true;break;}}catch(e){}}
  if(!found){alert('セーブデータが見つかりません');return;}
  if(!P){P={level:1};floor=0;}showSave();
}

function winGame(){
  stopBGM();sfxVictory();
  $('win-stats').innerHTML=`Lv.${P.level} / 討伐数:${P.totalKills} / 歩数:${P.steps}<br>所持金:${P.gold}G / クエスト:${Q.filter(q=>q.done).length}/${Q.length}`;
  show('win-sc');
}

document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();}
  const km={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  const d=km[e.key];if(d)move(d[0],d[1]);
});

// Title screen animation
(function(){
  const c=document.getElementById('title-canvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  const W=500,H=180;
  const stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,spd:Math.random()*0.3+0.1}));
  function frame(){
    ctx.fillStyle='#020208';ctx.fillRect(0,0,W,H);
    const t=Date.now()/1000;
    // stars
    stars.forEach(s=>{
      const a=0.4+Math.sin(t*s.spd*3+s.x)*0.4;
      ctx.fillStyle=`rgba(232,213,163,${a})`;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    });
    // castle silhouette
    ctx.fillStyle='#0a0a18';
    const drawTower=(x,w,h)=>{ctx.fillRect(x,H-h,w,h);ctx.fillRect(x-4,H-h-12,6,12);ctx.fillRect(x+w-2,H-h-12,6,12);};
    drawTower(160,30,80);drawTower(310,30,80);
    ctx.fillRect(190,H-60,120,60);
    ctx.fillRect(176,H-72,148,14);
    // gate
    ctx.fillStyle='#020208';
    ctx.beginPath();ctx.arc(254,H-60,18,Math.PI,0);ctx.fill();ctx.fillRect(236,H-60,36,40);
    // moon
    ctx.fillStyle='#e8d5a3';ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.arc(W/2,40,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0a18';
    ctx.beginPath();ctx.arc(W/2+10,36,24,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // dragon
    const dx=50+Math.sin(t*0.4)*30,dy=30+Math.sin(t*0.7)*10;
    ctx.fillStyle='rgba(100,20,100,0.7)';
    ctx.save();ctx.translate(dx,dy);
    ctx.beginPath();ctx.ellipse(0,0,12,6,t*0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,-4);ctx.lineTo(-18,-12);ctx.lineTo(-2,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,-4);ctx.lineTo(18,-12);ctx.lineTo(2,2);ctx.closePath();ctx.fill();
    ctx.restore();
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
